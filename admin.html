<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI SYSTEM V2 | النظام الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --card: #111111; --green: #00ff88; --red: #ff3e3e; --glass: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; }
        
        /* تأثيرات الخلفية */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%); z-index: -1; }

        .admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--gold); font-size: 2.5rem; font-weight: 900; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); letter-spacing: 2px; }
        
        /* الأقسام (Tabs) */
        .tabs { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: var(--glass); border: 1px solid #333; color: #888; padding: 15px; cursor: pointer; border-radius: 12px; font-weight: bold; transition: 0.4s; backdrop-filter: blur(10px); }
        .tab-btn.active { background: var(--gold); color: black; border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        .section { display: none; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #222; animation: slideUp 0.5s ease; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* النماذج (Forms) */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        /* سهم الأسهم (Stock Indicator) */
        .stock-market { display: flex; align-items: center; gap: 15px; background: #000; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #222; }
        .stock-arrow { font-size: 2rem; }
        .up { color: var(--green); text-shadow: 0 0 10px var(--green); }
        .down { color: var(--red); text-shadow: 0 0 10px var(--red); }

        .btn-save { background: var(--gold); color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }
        .btn-save:hover { transform: scale(1.02); filter: brightness(1.2); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #222; }
        th { background: #1a1a1a; color: var(--gold); font-weight: 900; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .search-res-box { background: #000; border: 1px solid var(--gold); padding: 20px; border-radius: 15px; margin-top: 20px; line-height: 2; }
        
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="admin-container">
    <header>
        <h1>OMNI ADMIN SYSTEM</h1>
        <p style="color: #666;">نظام الإدارة المتكامل للمتجر والمبيعات</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('products')">📦 إضافة منتج</button>
        <button class="tab-btn" onclick="showTab('orders')">💰 تسجيل بيعة</button>
        <button class="tab-btn" onclick="showTab('search')">🔍 بحث بالرمز</button>
        <button class="tab-btn" onclick="showTab('sales')">📊 التقارير والأسهم</button>
        <button class="tab-btn" onclick="showTab('manage')">⚙️ إدارة المتجر</button>
    </div>

    <div id="products" class="section active">
        <div class="form-grid">
            <div class="form-group"><label>اسم المنتج (إلزامي):</label><input type="text" id="p-name" placeholder="مثلاً: قراند 5 اوفلاين"></div>
            <div class="form-group"><label>السعر (إلزامي):</label><input type="number" id="p-price" placeholder="0.00"></div>
            <div class="form-group"><label>اسم الصورة في GitHub:</label><input type="text" id="p-img" placeholder="اسم_الصورة.jpg"></div>
            <div class="form-group"><label>قسم المنتج:</label>
                <select id="p-category">
                    <option value="steam">ستيم أوفلاين</option>
                    <option value="apps">اشتراكات برامج</option>
                    <option value="games">ألعاب أونلاين</option>
                </select>
            </div>
            <div class="form-group full-width"><label>وصف المنتج:</label><textarea id="p-desc" rows="3"></textarea></div>
            <div class="form-group"><label>رابط صورة للوصف (اختياري):</label><input type="text" id="p-desc-img"></div>
            <div class="form-group"><label>خيارات المنتج (اسم=سعر):</label><input type="text" id="p-options" placeholder="شهر=50, سنة=200"></div>
        </div>
        <button class="btn-save" onclick="saveToGithub()">نشر المنتج في متجر OMNI 🚀</button>
    </div>

    <div id="orders" class="section">
        <div class="form-grid">
            <div class="form-group"><label>اسم العميل:</label><input type="text" id="o-customer"></div>
            <div class="form-group"><label>رقم الجوال:</label><input type="text" id="o-phone"></div>
            <div class="form-group"><label>المنتج المطلوب:</label><input type="text" id="o-product"></div>
            <div class="form-group"><label>المبلغ المدفوع:</label><input type="number" id="o-amount"></div>
            <div class="form-group"><label>رمز الطلب (فريد):</label><input type="text" id="o-code" placeholder="مثلاً: OM-101"></div>
            <div class="form-group"><label>تاريخ اليوم:</label><input type="date" id="o-date"></div>
            <div class="form-group full-width"><label>رابط صورة الحوالة:</label><input type="text" id="o-transfer"></div>
            <div class="form-group full-width"><label>ملاحظات إضافية:</label><textarea id="o-notes"></textarea></div>
        </div>
        <button class="btn-save" style="background: var(--green);" onclick="saveSaleToSheets()">تسجيل العملية في قوقل شيت ✅</button>
    </div>

    <div id="search" class="section">
        <div style="display: flex; gap: 10px;">
            <input type="text" id="search-input" placeholder="أدخل رمز الطلب للبحث الفوري...">
            <button class="btn-save" style="width: 150px; margin: 0;" onclick="searchOrder()">بحث</button>
        </div>
        <div id="search-res"></div>
    </div>

    <div id="sales" class="section">
        <div class="stock-market">
            <div id="arrow-icon" class="stock-arrow up">▲</div>
            <div>
                <h3 id="profit-status">أداء المتجر متصاعد</h3>
                <p id="total-stats">إجمالي المبيعات: 0 ريال</p>
            </div>
        </div>
        <table id="sales-table">
            <thead><tr><th>الرمز</th><th>المنتج</th><th>العميل</th><th>المبلغ</th><th>التاريخ</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // --- بيانات الربط السرية ---
    const GITHUB_TOKEN = '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';
    const GITHUB_USER = 'aabd78131-cmd';
    const GITHUB_REPO = 'omni-store';
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxbYwConHNyO-Pxoh9d6cyoJof1WV28lKcD9AXl4rNjkrPL50254T_T19WPcmpjWPZS/exec';

    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'sales') fetchSalesFromSheets();
    }

    // --- وظيفة الحفظ في GitHub (إضافة/تعديل منتج) ---
    async function saveToGithub() {
        const product = {
            id: Date.now(),
            name: document.getElementById('p-name').value,
            price: document.getElementById('p-price').value,
            img: document.getElementById('p-img').value,
            category: document.getElementById('p-category').value,
            desc: document.getElementById('p-desc').value,
            extraImg: document.getElementById('p-desc-img').value,
            options: document.getElementById('p-options').value
        };

        if(!product.name || !product.price) return alert("أكمل البيانات الإلزامية");

        const filePath = 'data.js';
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${filePath}`;

        try {
            const res = await fetch(url, { headers: { Authorization: `token ${GITHUB_TOKEN}` } });
            const data = await res.json();
            const sha = data.sha;
            
            // تحديث محتوى الملف (بافتراض أنه ملف JSON)
            let content = JSON.parse(atob(data.content));
            content.push(product);
            const updatedBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));

            const updateRes = await fetch(url, {
                method: 'PUT',
                headers: { Authorization: `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update Products", content: updatedBase64, sha: sha })
            });

            if(updateRes.ok) alert("تم تحديث المتجر بنجاح! سيظهر المنتج خلال دقيقتين.");
        } catch(e) { alert("حدث خطأ في الربط مع GitHub"); }
    }

    // --- وظيفة الحفظ في قوقل شيت (تسجيل بيعة) ---
    async function saveSaleToSheets() {
        const sale = {
            customerName: document.getElementById('o-customer').value,
            phone: document.getElementById('o-phone').value,
            product: document.getElementById('o-product').value,
            price: document.getElementById('o-amount').value,
            date: document.getElementById('o-date').value,
            transferImg: document.getElementById('o-transfer').value,
            orderId: document.getElementById('o-code').value,
            notes: document.getElementById('o-notes').value
        };

        const res = await fetch(SHEET_URL, {
            method: 'POST',
            body: JSON.stringify(sale)
        });

        if(res.ok) alert("تم تسجيل البيعة في قوقل شيت بنجاح!");
    }

    // --- وظيفة البحث عن طلب ---
    async function searchOrder() {
        const code = document.getElementById('search-input').value;
        const resBox = document.getElementById('search-res');
        resBox.innerHTML = "جاري البحث...";

        const res = await fetch(`${SHEET_URL}?searchId=${code}`);
        const data = await res.json();

        if(data.status === "found") {
            const row = data.row;
            resBox.innerHTML = `
                <div class="search-res-box">
                    <p><b>العميل:</b> ${row[0]}</p>
                    <p><b>المنتج:</b> ${row[2]}</p>
                    <p><b>المبلغ:</b> ${row[3]} ريال</p>
                    <p><b>التاريخ:</b> ${row[4]}</p>
                    <p><b>صورة الحوالة:</b> <a href="${row[5]}" target="_blank" style="color:var(--gold)">فتح الصورة</a></p>
                    <img src="${row[5]}" style="width:100px; margin-top:10px; border-radius:10px;">
                </div>`;
        } else {
            resBox.innerHTML = "الرمز غير موجود!";
        }
    }

    // --- وظيفة جلب التقارير المالية ---
    async function fetchSalesFromSheets() {
        const res = await fetch(SHEET_URL);
        const data = await res.json();
        const tbody = document.querySelector('#sales-table tbody');
        tbody.innerHTML = "";
        let total = 0;

        data.rows.forEach(r => {
            total += parseFloat(r[3]);
            tbody.innerHTML += `<tr><td>${r[6]}</td><td>${r[2]}</td><td>${r[0]}</td><td>${r[3]}</td><td>${r[4]}</td></tr>`;
        });

        document.getElementById('total-stats').innerText = `إجمالي المبيعات: ${total} ريال`;
        // تحديث السهم بناء على الربح (تجريبي)
        const arrow = document.getElementById('arrow-icon');
        if(total > 500) { arrow.className = "stock-arrow up"; arrow.innerText = "▲"; }
        else { arrow.className = "stock-arrow down"; arrow.innerText = "▼"; }
    }
</script>
</body>
</html>
