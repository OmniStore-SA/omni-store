<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أومني المتكامل | OMNI ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #151515; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; padding: 10px; }
        
        .admin-container { max-width: 1100px; margin: 0 auto; }
        h1 { color: var(--gold); text-align: center; margin: 20px 0; border-bottom: 2px solid var(--gold); padding-bottom: 10px; font-weight: 900; }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .tab-btn { background: var(--card); border: 1px solid var(--gold); color: white; padding: 12px; cursor: pointer; border-radius: 10px; font-weight: bold; flex: 1; min-width: 120px; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: black; }
        
        .section { display: none; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-size: 0.9rem; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; outline: none; }
        input:focus { border-color: var(--gold); }
        
        .date-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .stat-box h3 { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        .stat-box p { font-size: 1.4rem; font-weight: 900; }

        .btn-save { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-save:hover { opacity: 0.8; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid #222; padding: 12px; text-align: center; }
        th { background: #1a1a1a; color: var(--gold); }
        
        .profit { color: var(--green); font-weight: bold; }
        .loss { color: var(--red); font-weight: bold; }
        
        .hint { font-size: 0.75rem; color: #666; margin-top: 4px; }
        .result-item { background: #000; padding: 15px; border-radius: 10px; border: 1px dashed var(--gold); margin-top: 10px; line-height: 1.8; }

        .action-btns { display: flex; gap: 5px; justify-content: center; }
        .btn-edit { background: var(--blue); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-del { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-disc { background: var(--green); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* تعديل للموبايل */
        @media (max-width: 600px) {
            table { font-size: 0.7rem; }
            th, td { padding: 5px; }
            .date-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>لوحة تحكم أومني الشاملة</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('products')">📦 إضافة منتج</button>
        <button class="tab-btn" onclick="showTab('orders')">💰 تسجيل بيعة</button>
        <button class="tab-btn" onclick="showTab('search')">🔍 بحث بالرمز</button>
        <button class="tab-btn" onclick="showTab('sales')">📊 التقارير المالية</button>
        <button class="tab-btn" onclick="showTab('manage')">⚙️ إدارة المنتجات</button>
    </div>

    <div id="products" class="section active">
        <div class="form-group">
            <label>اختر قسم المتجر:</label>
            <select id="p-category">
                <option>قسم ستيم أوفلاين</option>
                <option>قسم انستا</option>
                <option>قسم تيك توك</option>
                <option>قسم الترفيه</option>
                <option>قسم الذكاء الاصطناعي</option>
            </select>
        </div>
        <div class="form-group"><label>اسم المنتج:</label><input type="text" id="p-name"></div>
        <div class="form-group"><label>اسم الصورة الرئيسية:</label><input type="text" id="p-img" placeholder="image.jpeg"></div>
        <div class="form-group"><label>الوصف:</label><textarea id="p-desc" rows="2"></textarea></div>
        
        <div class="form-group">
            <label>صور إضافية للوصف (اختياري):</label>
            <input type="text" id="p-extra-imgs" placeholder="مثال: img1.jpg, img2.png">
            <p class="hint">ضع أسماء الصور مفصولة بفاصلة</p>
        </div>

        <div class="form-group"><label>سعر البيع الافتراضي:</label><input type="number" id="p-price"></div>
        
        <div class="form-group">
            <label>خيارات المنتج (اختياري):</label>
            <textarea id="p-vars" rows="2" placeholder="شهر=10, شهرين=20"></textarea>
            <p class="hint">اتركها فارغة إذا لم توجد خيارات</p>
        </div>

        <button class="btn-save" onclick="saveProduct()">نشر المنتج في المتجر</button>
    </div>

    <div id="orders" class="section">
        <div class="form-group"><label>اسم المنتج المباع:</label><input type="text" id="o-product-name"></div>
        <div class="form-group"><label>الرمز (للبحث لاحقاً):</label><input type="text" id="o-id" placeholder="مثال: #A10"></div>
        
        <label>تاريخ العملية:</label>
        <div class="form-group date-row">
            <input type="number" id="o-day" placeholder="اليوم">
            <input type="number" id="o-month" placeholder="الشهر">
            <input type="number" id="o-year" placeholder="السنة">
        </div>

        <div class="form-group"><label>سعر التكلفة (كم كلفك):</label><input type="number" id="o-cost" placeholder="0.00"></div>
        <div class="form-group"><label>سعر البيع (كم دفع الزبون):</label><input type="number" id="o-sold" placeholder="0.00"></div>
        <div class="form-group"><label>بيانات العميل أو ملاحظات:</label><textarea id="o-data" rows="3"></textarea></div>
        <button class="btn-save" onclick="saveSale()">تسجيل العملية وحساب الربح</button>
    </div>

    <div id="search" class="section">
        <input type="text" id="search-input" oninput="doSearch()" placeholder="أدخل الرمز للبحث عن بيانات الطلب...">
        <div id="search-res"></div>
    </div>

    <div id="sales" class="section">
        <div class="stats-grid">
            <div class="stat-box"><h3>إجمالي المبيعات</h3><p id="total-revenue">0</p></div>
            <div class="stat-box"><h3>إجمالي التكلفة</h3><p id="total-costs">0</p></div>
            <div class="stat-box"><h3>صافي الربح</h3><p id="net-profit" style="color:var(--green)">0</p></div>
            <div class="stat-box"><h3>الأكثر مبيعاً</h3><p id="top-product" style="font-size:1rem; color:var(--gold)">-</p></div>
        </div>

        <table id="sales-table">
            <thead>
                <tr>
                    <th>الرمز</th>
                    <th>التاريخ</th>
                    <th>المنتج</th>
                    <th>التكلفة</th>
                    <th>البيع</th>
                    <th>الربح</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="manage" class="section">
        <div id="edit-form-container" style="display:none; border: 1px solid var(--gold); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <h3 style="color:var(--gold); margin-bottom:10px;">تعديل المنتج</h3>
            <input type="hidden" id="edit-index">
            <div class="form-group"><label>الاسم:</label><input type="text" id="edit-name"></div>
            <div class="form-group"><label>السعر:</label><input type="number" id="edit-price"></div>
            <div class="form-group"><label>القسم:</label><input type="text" id="edit-category"></div>
            <div class="form-group"><label>الصورة:</label><input type="text" id="edit-img"></div>
            <div class="form-group"><label>الوصف:</label><textarea id="edit-desc"></textarea></div>
            <div class="form-group"><label>صور إضافية:</label><input type="text" id="edit-extra"></div>
            <div class="form-group"><label>الخيارات:</label><textarea id="edit-vars"></textarea></div>
            <button class="btn-save" onclick="updateProduct()">حفظ التعديلات</button>
            <button class="btn-save" style="background:#444; color:white;" onclick="hideEditForm()">إلغاء</button>
        </div>

        <table id="manage-table">
            <thead>
                <tr>
                    <th>المنتج</th>
                    <th>القسم</th>
                    <th>السعر</th>
                    <th>التحكم</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // تعبئة التاريخ تلقائياً عند الفتح
    window.onload = () => {
        const d = new Date();
        document.getElementById('o-day').value = d.getDate();
        document.getElementById('o-month').value = d.getMonth() + 1;
        document.getElementById('o-year').value = d.getFullYear();
    };

    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'sales') renderSales();
        if(tabId === 'manage') renderManageProducts();
    }

    function saveProduct() {
        const p = {
            category: document.getElementById('p-category').value,
            name: document.getElementById('p-name').value,
            img: document.getElementById('p-img').value,
            desc: document.getElementById('p-desc').value,
            extraImgs: document.getElementById('p-extra-imgs').value,
            price: document.getElementById('p-price').value,
            vars: document.getElementById('p-vars').value
        };
        if(!p.name) return alert('اسم المنتج مطلوب');
        
        let prods = JSON.parse(localStorage.getItem('omni_store_products') || '[]');
        prods.push(p);
        localStorage.setItem('omni_store_products', JSON.stringify(prods));
        alert('تم حفظ المنتج بنجاح في قسم ' + p.category);
    }

    function saveSale() {
        const day = document.getElementById('o-day').value;
        const month = document.getElementById('o-month').value;
        const year = document.getElementById('o-year').value;

        const sale = {
            id: document.getElementById('o-id').value,
            name: document.getElementById('o-product-name').value,
            cost: parseFloat(document.getElementById('o-cost').value || 0),
            sold: parseFloat(document.getElementById('o-sold').value || 0),
            data: document.getElementById('o-data').value,
            date: `${year}/${month}/${day}`
        };
        if(!sale.id || !sale.name) return alert('يرجى إكمال الرمز واسم المنتج');

        let finance = JSON.parse(localStorage.getItem('omni_finance_records') || '[]');
        finance.push(sale);
        localStorage.setItem('omni_finance_records', JSON.stringify(finance));
        alert('تم تسجيل العملية المالية بتارخ ' + sale.date);
    }

    function renderSales() {
        let sales = JSON.parse(localStorage.getItem('omni_finance_records') || '[]');
        const tbody = document.querySelector('#sales-table tbody');
        tbody.innerHTML = '';
        
        let rev = 0, costs = 0, net = 0;
        let counts = {};

        sales.forEach((s, i) => {
            const profit = s.sold - s.cost;
            rev += s.sold;
            costs += s.cost;
            net += profit;
            counts[s.name] = (counts[s.name] || 0) + 1;

            tbody.innerHTML += `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.date}</td>
                    <td>${s.name}</td>
                    <td>${s.cost}</td>
                    <td>${s.sold}</td>
                    <td class="${profit >= 0 ? 'profit' : 'loss'}">${profit.toFixed(2)}</td>
                    <td><button onclick="deleteSale(${i})" style="color:red; cursor:pointer; background:none; border:none;">✕</button></td>
                </tr>`;
        });

        document.getElementById('total-revenue').innerText = rev.toFixed(2) + " ريال";
        document.getElementById('total-costs').innerText = costs.toFixed(2) + " ريال";
        document.getElementById('net-profit').innerText = net.toFixed(2) + " ريال";
        
        let sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
        if(sorted.length > 0) document.getElementById('top-product').innerText = sorted[0][0];
    }

    // --- وظائف إدارة المنتجات الجديدة ---

    function renderManageProducts() {
        let prods = JSON.parse(localStorage.getItem('omni_store_products') || '[]');
        const tbody = document.querySelector('#manage-table tbody');
        tbody.innerHTML = '';

        prods.forEach((p, i) => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.category}</td>
                    <td>${p.price} ريال</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-edit" onclick="editProduct(${i})">تعديل</button>
                            <button class="btn-disc" onclick="applyDiscount(${i})">خصم</button>
                            <button class="btn-del" onclick="deleteProduct(${i})">حذف</button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    function deleteProduct(i) {
        if(!confirm('هل أنت متأكد من حذف المنتج نهائياً؟')) return;
        let prods = JSON.parse(localStorage.getItem('omni_store_products'));
        prods.splice(i, 1);
        localStorage.setItem('omni_store_products', JSON.stringify(prods));
        renderManageProducts();
    }

    function applyDiscount(i) {
        let percent = prompt("أدخل نسبة الخصم (مثال: 10 تعني 10%):");
        if(percent) {
            let prods = JSON.parse(localStorage.getItem('omni_store_products'));
            let oldPrice = parseFloat(prods[i].price);
            let discount = oldPrice * (percent / 100);
            prods[i].price = (oldPrice - discount).toFixed(2);
            localStorage.setItem('omni_store_products', JSON.stringify(prods));
            renderManageProducts();
            alert("تم تطبيق الخصم بنجاح");
        }
    }

    function editProduct(i) {
        let prods = JSON.parse(localStorage.getItem('omni_store_products'));
        let p = prods[i];
        document.getElementById('edit-index').value = i;
        document.getElementById('edit-name').value = p.name;
        document.getElementById('edit-price').value = p.price;
        document.getElementById('edit-category').value = p.category;
        document.getElementById('edit-img').value = p.img;
        document.getElementById('edit-desc').value = p.desc;
        document.getElementById('edit-extra').value = p.extraImgs || '';
        document.getElementById('edit-vars').value = p.vars || '';
        
        document.getElementById('edit-form-container').style.display = 'block';
        window.scrollTo(0,0);
    }

    function updateProduct() {
        let i = document.getElementById('edit-index').value;
        let prods = JSON.parse(localStorage.getItem('omni_store_products'));
        
        prods[i] = {
            name: document.getElementById('edit-name').value,
            price: document.getElementById('edit-price').value,
            category: document.getElementById('edit-category').value,
            img: document.getElementById('edit-img').value,
            desc: document.getElementById('edit-desc').value,
            extraImgs: document.getElementById('edit-extra').value,
            vars: document.getElementById('edit-vars').value
        };

        localStorage.setItem('omni_store_products', JSON.stringify(prods));
        alert('تم تحديث بيانات المنتج');
        hideEditForm();
        renderManageProducts();
    }

    function hideEditForm() {
        document.getElementById('edit-form-container').style.display = 'none';
    }

    // --- نهاية وظائف الإدارة ---

    function doSearch() {
        const val = document.getElementById('search-input').value;
        const res = document.getElementById('search-res');
        if(!val) { res.innerHTML = ''; return; }
        
        let sales = JSON.parse(localStorage.getItem('omni_finance_records') || '[]');
        const found = sales.find(s => s.id === val);
        
        if(found) {
            res.innerHTML = `
                <div class="result-item">
                    <b style="color:var(--gold)">📦 المنتج:</b> ${found.name} <br>
                    <b>💰 التكلفة:</b> ${found.cost} ريال | <b>💵 سعر البيع:</b> ${found.sold} ريال <br>
                    <b>📅 التاريخ:</b> ${found.date} <br>
                    <hr style="border:0; border-top:1px solid #333; margin:5px 0;">
                    <b>📝 البيانات المخزنة:</b> <br> ${found.data}
                </div>`;
        } else { res.innerHTML = '<p style="color:#666; margin-top:10px;">لا يوجد سجل لهذا الرمز</p>'; }
    }

    function deleteSale(i) {
        if(!confirm('هل تريد حذف هذه العملية من السجلات؟')) return;
        let sales = JSON.parse(localStorage.getItem('omni_finance_records'));
        sales.splice(i, 1);
        localStorage.setItem('omni_finance_records', JSON.stringify(sales));
        renderSales();
    }
</script>
</body>
</html>
