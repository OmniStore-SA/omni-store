<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OMNI ADMIN | لوحة تحكم أومني الشاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #151515; --green: #2ecc71; --red: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; }
        .admin-container { max-width: 900px; margin: 0 auto; }
        h1 { color: var(--gold); text-align: center; margin-bottom: 20px; font-weight: 900; }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
        .tab-btn { background: var(--card); border: 1px solid var(--gold); color: white; padding: 12px; cursor: pointer; border-radius: 8px; flex: 1; min-width: 100px; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: black; }
        
        .section { display: none; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .section.active { display: block; }

        .form-group { margin-bottom: 15px; }
        label { display: block; color: var(--gold); margin-bottom: 5px; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; }
        .btn-save { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8rem; }
        th, td { border: 1px solid #222; padding: 10px; text-align: center; }
        th { color: var(--gold); }
        .stat-box { background: #111; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #222; flex: 1; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>لوحة تحكم أومني</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('products')">📦 إضافة للمتجر</button>
        <button class="tab-btn" onclick="showTab('finance')">💰 تسجيل بيعة</button>
        <button class="tab-btn" onclick="showTab('reports')">📊 التقارير</button>
        <button class="tab-btn" onclick="showTab('manage')">⚙️ الإدارة</button>
    </div>

    <div id="products" class="section active">
        <div class="form-group"><label>القسم:</label>
            <select id="p-category">
                <option value="social">قسم الترفيه</option>
                <option value="insta">قسم انستا</option>
                <option value="tiktok">قسم تيك توك</option>
                <option value="steam_offline">ستيم أوفلاين</option>
                <option value="ai">ذكاء اصطناعي</option>
            </select>
        </div>
        <div class="form-group"><label>اسم المنتج:</label><input type="text" id="p-name"></div>
        <div class="form-group"><label>رابط الصورة الأساسية:</label><input type="text" id="p-img"></div>
        <div class="form-group"><label>الوصف:</label><textarea id="p-desc" rows="2"></textarea></div>
        <div class="form-group"><label>صور إضافية (روابط تفصلها فاصلة):</label><input type="text" id="p-extra-imgs" placeholder="link1.png, link2.png"></div>
        <div class="form-group"><label>خيارات المنتج (مثال: سنة:50, شهر:10):</label><input type="text" id="p-vars"></div>
        <div class="form-group"><label>السعر الأساسي:</label><input type="number" id="p-price"></div>
        <button class="btn-save" onclick="saveToFirebase()">نشر في المتجر فوراً 🚀</button>
    </div>

    <div id="finance" class="section">
        <div class="form-group"><label>اسم المنتج المباع:</label><input type="text" id="f-name"></div>
        <div class="form-group"><label>الرمز (#):</label><input type="text" id="f-code"></div>
        <div class="form-group"><label>سعر التكلفة:</label><input type="number" id="f-cost"></div>
        <div class="form-group"><label>سعر البيع:</label><input type="number" id="f-sold"></div>
        <div class="form-group"><label>ملاحظات/بيانات العميل:</label><textarea id="f-data" rows="2"></textarea></div>
        <button class="btn-save" style="background:var(--green)" onclick="saveFinance()">حفظ السجل المالي 💵</button>
    </div>

    <div id="reports" class="section">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div class="stat-box"><h4>المبيعات</h4><p id="stat-rev">0</p></div>
            <div class="stat-box"><h4>صافي الربح</h4><p id="stat-profit" style="color:var(--green)">0</p></div>
        </div>
        <table id="finance-table">
            <thead><tr><th>الرمز</th><th>المنتج</th><th>التكلفة</th><th>البيع</th><th>الربح</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="manage" class="section">
        <table id="manage-table">
            <thead><tr><th>المنتج</th><th>السعر</th><th>التحكم</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQjyV07I",
        authDomain: "omnistore-a5251.firebaseapp.com",
        databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
        projectId: "omnistore-a5251",
        storageBucket: "omnistore-a5251.appspot.com",
        messagingSenderId: "542087784992",
        appId: "1:542087784992:web:8a83435b3ef36678c3aa45"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.saveToFirebase = function() {
        const productData = {
            category: document.getElementById('p-category').value,
            name: document.getElementById('p-name').value,
            image: document.getElementById('p-img').value,
            description: document.getElementById('p-desc').value,
            extraImages: document.getElementById('p-extra-imgs').value,
            options: document.getElementById('p-vars').value,
            price: document.getElementById('p-price').value
        };
        if(!productData.name || !productData.price) return alert('أدخل الاسم والسعر');
        const newRef = push(ref(db, 'products'));
        set(newRef, productData).then(() => {
            alert('تم النشر بنجاح!');
            document.querySelectorAll('#products input, #products textarea').forEach(i => i.value = '');
        });
    };

    window.showTab = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const activeBtn = [...document.querySelectorAll('.tab-btn')].find(b => b.innerText.includes(id === 'products' ? 'إضافة' : id === 'finance' ? 'تسجيل' : id === 'reports' ? 'التقارير' : 'الإدارة'));
        if(activeBtn) activeBtn.classList.add('active');
        if(id === 'reports') renderFinance();
        if(id === 'manage') fetchManage();
    };

    window.saveFinance = () => {
        const sale = {
            code: document.getElementById('f-code').value,
            name: document.getElementById('f-name').value,
            cost: parseFloat(document.getElementById('f-cost').value),
            sold: parseFloat(document.getElementById('f-sold').value)
        };
        let records = JSON.parse(localStorage.getItem('omni_finance') || '[]');
        records.push(sale);
        localStorage.setItem('omni_finance', JSON.stringify(records));
        alert('تم حفظ السجل المالي');
    };

    function renderFinance() {
        let records = JSON.parse(localStorage.getItem('omni_finance') || '[]');
        const tbody = document.querySelector('#finance-table tbody');
        tbody.innerHTML = '';
        let totalRev = 0, totalProfit = 0;
        records.forEach(r => {
            let profit = r.sold - r.cost;
            totalRev += r.sold; totalProfit += profit;
            tbody.innerHTML += `<tr><td>${r.code}</td><td>${r.name}</td><td>${r.cost}</td><td>${r.sold}</td><td style="color:var(--green)">${profit}</td></tr>`;
        });
        document.getElementById('stat-rev').innerText = totalRev + " ريال";
        document.getElementById('stat-profit').innerText = totalProfit + " ريال";
    }

    function fetchManage() {
        onValue(ref(db, 'products'), (snapshot) => {
            const data = snapshot.val();
            const tbody = document.querySelector('#manage-table tbody');
            tbody.innerHTML = '';
            for(let id in data) {
                tbody.innerHTML += `<tr><td>${data[id].name}</td><td>${data[id].price}</td><td><button onclick="delProduct('${id}')" style="background:red; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">حذف</button></td></tr>`;
            }
        });
    }

    window.delProduct = (id) => { if(confirm('حذف نهائي؟')) remove(ref(db, `products/${id}`)); };
</script>
</body>
</html>
