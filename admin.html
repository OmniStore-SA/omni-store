<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أومني المتكامل | OMNI ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #151515; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; padding: 10px; }
        .admin-container { max-width: 1100px; margin: 0 auto; }
        h1 { color: var(--gold); text-align: center; margin: 20px 0; border-bottom: 2px solid var(--gold); padding-bottom: 10px; font-weight: 900; }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .tab-btn { background: var(--card); border: 1px solid var(--gold); color: white; padding: 12px; cursor: pointer; border-radius: 10px; font-weight: bold; flex: 1; min-width: 120px; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: black; }
        .section { display: none; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .section.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; outline: none; }
        .btn-save { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid #222; padding: 12px; text-align: center; }
        th { background: #1a1a1a; color: var(--gold); }
        .profit { color: var(--green); } .loss { color: var(--red); }
        .action-btns { display: flex; gap: 5px; justify-content: center; }
        .btn-edit { background: var(--blue); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-del { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>لوحة تحكم أومني</h1>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('products')">📦 إضافة منتج</button>
        <button class="tab-btn" onclick="showTab('manage')">⚙️ إدارة المنتجات</button>
        <button class="tab-btn" onclick="showTab('orders')">💰 تسجيل بيعة</button>
        <button class="tab-btn" onclick="showTab('sales')">📊 التقارير</button>
    </div>

    <div id="products" class="section active">
        <div class="form-group"><label>القسم:</label>
            <select id="p-category">
                <option value="entertainment">قسم الترفيه</option>
                <option value="insta">قسم انستا</option>
                <option value="tiktok">قسم تيك توك</option>
                <option value="steam_offline">قسم ستيم أوفلاين</option>
                <option value="ai">قسم الذكاء الاصطناعي</option>
            </select>
        </div>
        <div class="form-group"><label>الاسم:</label><input type="text" id="p-name"></div>
        <div class="form-group"><label>اسم الصورة (مثال: logo.jpg):</label><input type="text" id="p-img"></div>
        <div class="form-group"><label>الوصف:</label><textarea id="p-desc" rows="2"></textarea></div>
        <div class="form-group"><label>السعر:</label><input type="number" id="p-price"></div>
        <div class="form-group"><label>الخيارات (اختياري: شهر=10, شهرين=20):</label><input type="text" id="p-vars"></div>
        <button class="btn-save" onclick="saveProduct()">نشر في المتجر</button>
    </div>

    <div id="manage" class="section">
        <table id="manage-table">
            <thead><tr><th>المنتج</th><th>القسم</th><th>السعر</th><th>التحكم</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="orders" class="section">
        <div class="form-group"><label>اسم المنتج:</label><input type="text" id="o-name"></div>
        <div class="form-group"><label>التكلفة:</label><input type="number" id="o-cost"></div>
        <div class="form-group"><label>سعر البيع:</label><input type="number" id="o-sold"></div>
        <button class="btn-save" onclick="saveSale()">تسجيل البيعة</button>
    </div>

    <div id="sales" class="section">
        <div id="stats" style="margin-bottom:20px; display:flex; gap:10px;"></div>
        <table id="sales-table">
            <thead><tr><th>المنتج</th><th>التكلفة</th><th>البيع</th><th>الربح</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'manage') renderManage();
        if(id === 'sales') renderSales();
    }

    function saveProduct() {
        const p = {
            id: 'P-' + Date.now(),
            category: document.getElementById('p-category').value,
            name: document.getElementById('p-name').value,
            img: document.getElementById('p-img').value || 'placeholder.jpg',
            desc: document.getElementById('p-desc').value,
            price: document.getElementById('p-price').value,
            vars: document.getElementById('p-vars').value
        };
        if(!p.name || !p.price) return alert('أكمل البيانات');
        let data = JSON.parse(localStorage.getItem('omni_store_products') || '[]');
        data.push(p);
        localStorage.setItem('omni_store_products', JSON.stringify(data));
        alert('تم النشر!');
    }

    function renderManage() {
        let data = JSON.parse(localStorage.getItem('omni_store_products') || '[]');
        const tbody = document.querySelector('#manage-table tbody');
        tbody.innerHTML = '';
        data.forEach((p, i) => {
            tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.category}</td><td>${p.price}</td><td><button class="btn-del" onclick="delProd(${i})">حذف</button></td></tr>`;
        });
    }

    function delProd(i) {
        let data = JSON.parse(localStorage.getItem('omni_store_products'));
        data.splice(i, 1);
        localStorage.setItem('omni_store_products', JSON.stringify(data));
        renderManage();
    }

    function saveSale() {
        const s = {
            name: document.getElementById('o-name').value,
            cost: parseFloat(document.getElementById('o-cost').value || 0),
            sold: parseFloat(document.getElementById('o-sold').value || 0)
        };
        let data = JSON.parse(localStorage.getItem('omni_sales') || '[]');
        data.push(s);
        localStorage.setItem('omni_sales', JSON.stringify(data));
        alert('تم التسجيل');
    }

    function renderSales() {
        let data = JSON.parse(localStorage.getItem('omni_sales') || '[]');
        const tbody = document.querySelector('#sales-table tbody');
        tbody.innerHTML = '';
        let totalProfit = 0;
        data.forEach(s => {
            let profit = s.sold - s.cost;
            totalProfit += profit;
            tbody.innerHTML += `<tr><td>${s.name}</td><td>${s.cost}</td><td>${s.sold}</td><td class="${profit >=0 ? 'profit' : 'loss'}">${profit}</td></tr>`;
        });
        document.getElementById('stats').innerHTML = `<h3>إجمالي الأرباح: ${totalProfit.toFixed(2)} ريال</h3>`;
    }
</script>
</body>
</html>
