<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم المتقدمة | أومني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #151515; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; }
        
        .admin-container { max-width: 1000px; margin: 0 auto; }
        h1 { color: var(--gold); text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { background: var(--card); border: 1px solid var(--gold); color: white; padding: 10px 20px; cursor: pointer; border-radius: 10px; font-weight: bold; flex: 1; min-width: 120px; }
        .tab-btn.active { background: var(--gold); color: black; }
        
        .section { display: none; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .section.active { display: block; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--gold); font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--gold); }
        
        .btn-add { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-add:hover { opacity: 0.8; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #000; font-size: 0.9rem; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: var(--gold); color: black; }
        
        .search-result { background: #1a1a1a; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px dashed var(--gold); display: none; }
        .delete-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        
        .hint { font-size: 0.8rem; color: #888; margin-top: 4px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>لوحة التحكم الاحترافية</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('products')">📦 إضافة منتج</button>
        <button class="tab-btn" onclick="showTab('orders')">📝 إضافة طلب</button>
        <button class="tab-btn" onclick="showTab('search')">🔍 بحث بالرمز</button>
        <button class="tab-btn" onclick="showTab('sales')">📊 المبيعات</button>
    </div>

    <div id="products" class="section active">
        <div class="form-group">
            <label>اختر قسم المتجر:</label>
            <select id="p-category">
                <option value="قسم ستيم أوفلاين">قسم ستيم أوفلاين</option>
                <option value="قسم انستا">خدمات انستقرام</option>
                <option value="قسم تيك توك">خدمات تيك توك</option>
                <option value="قسم الترفيه">اشتراكات الترفيه</option>
                <option value="قسم الذكاء الاصطناعي">الذكاء الاصطناعي</option>
            </select>
        </div>
        <div class="form-group">
            <label>اسم المنتج:</label>
            <input type="text" id="p-name" placeholder="مثلاً: يوتيوب بريميوم">
        </div>
        <div class="form-group">
            <label>اسم الصورة الرئيسية:</label>
            <input type="text" id="p-img" placeholder="image.jpeg">
        </div>
        <div class="form-group">
            <label>الوصف:</label>
            <textarea id="p-desc" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label>صور إضافية للوصف (اختياري):</label>
            <input type="text" id="p-extra-imgs" placeholder="ضع أسماء الصور هنا مفصولة بفاصلة">
        </div>
        <div class="form-group">
            <label>السعر الأساسي:</label>
            <input type="text" id="p-price" placeholder="مثلاً: 20">
        </div>
        <div class="form-group">
            <label>خيارات المنتج (اختياري):</label>
            <textarea id="p-vars" rows="2" placeholder="اكتبها بهذا الشكل: شهر=10, شهرين=20"></textarea>
            <p class="hint">اتركها فارغة إذا لا يوجد خيارات</p>
        </div>
        <button class="btn-add" onclick="saveProduct()">نشر المنتج في القسم المختار</button>
    </div>

    <div id="orders" class="section">
        <div class="form-group">
            <label>رقم الطلب أو الرمز:</label>
            <input type="text" id="o-id" placeholder="مثلاً: #7788">
        </div>
        <div class="form-group">
            <label>بيانات العميل والطلب بالكامل:</label>
            <textarea id="o-data" rows="5" placeholder="اكتب كل شيء هنا..."></textarea>
        </div>
        <div class="form-group">
            <label>المبلغ:</label>
            <input type="number" id="o-amount">
        </div>
        <button class="btn-add" onclick="saveOrder()">حفظ البيانات في الأرشيف</button>
    </div>

    <div id="search" class="section">
        <div class="form-group">
            <label>أدخل الرمز أو رقم الطلب للبحث:</label>
            <input type="text" id="search-input" oninput="searchOrder()" placeholder="اكتب الرمز هنا...">
        </div>
        <div id="search-result-box" class="search-result">
            <h3 style="color:var(--gold)">تم العثور على البيانات:</h3>
            <div id="result-content" style="margin-top:10px; white-space: pre-wrap; line-height: 1.6;"></div>
        </div>
    </div>

    <div id="sales" class="section">
        <table id="sales-table">
            <thead>
                <tr>
                    <th>الرمز</th>
                    <th>البيانات</th>
                    <th>المبلغ</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'sales') updateSalesTable();
    }

    // حفظ المنتج
    function saveProduct() {
        const product = {
            category: document.getElementById('p-category').value,
            name: document.getElementById('p-name').value,
            img: document.getElementById('p-img').value,
            desc: document.getElementById('p-desc').value,
            extraImgs: document.getElementById('p-extra-imgs').value,
            price: document.getElementById('p-price').value,
            vars: document.getElementById('p-vars').value
        };
        
        if(!product.name) return alert('اسم المنتج مطلوب');
        
        let products = JSON.parse(localStorage.getItem('omni_products') || '[]');
        products.push(product);
        localStorage.setItem('omni_products', JSON.stringify(products));
        alert('تمت إضافة المنتج بنجاح إلى ' + product.category);
    }

    // حفظ الطلب
    function saveOrder() {
        const order = {
            id: document.getElementById('o-id').value,
            data: document.getElementById('o-data').value,
            amount: document.getElementById('o-amount').value,
            date: new Date().toLocaleString('ar-SA')
        };
        if(!order.id) return alert('يجب وضع رمز للبحث لاحقاً');

        let sales = JSON.parse(localStorage.getItem('omni_sales') || '[]');
        sales.push(order);
        localStorage.setItem('omni_sales', JSON.stringify(sales));
        alert('تم حفظ البيانات بنجاح');
        document.getElementById('o-id').value = '';
        document.getElementById('o-data').value = '';
    }

    // البحث بالرمز
    function searchOrder() {
        const val = document.getElementById('search-input').value.trim();
        const resultBox = document.getElementById('search-result-box');
        const resultContent = document.getElementById('result-content');
        
        if(!val) { resultBox.style.display = 'none'; return; }

        let sales = JSON.parse(localStorage.getItem('omni_sales') || '[]');
        const found = sales.find(s => s.id === val);

        if(found) {
            resultBox.style.display = 'block';
            resultContent.innerHTML = `
                <b>الرمز:</b> ${found.id} <br>
                <b>التاريخ:</b> ${found.date} <br>
                <b>المبلغ:</b> ${found.amount} ريال <br>
                <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
                <b>البيانات المحفوظة:</b> <br> ${found.data}
            `;
        } else {
            resultBox.style.display = 'none';
        }
    }

    function updateSalesTable() {
        let sales = JSON.parse(localStorage.getItem('omni_sales') || '[]');
        const tbody = document.querySelector('#sales-table tbody');
        tbody.innerHTML = '';
        sales.forEach((s, index) => {
            tbody.innerHTML += `<tr>
                <td>${s.id}</td>
                <td style="text-align:right">${s.data.substring(0,30)}...</td>
                <td>${s.amount}</td>
                <td><button class="delete-btn" onclick="deleteSales(${index})">حذف</button></td>
            </tr>`;
        });
    }

    function deleteSales(index) {
        if(!confirm('حذف البيانات؟')) return;
        let sales = JSON.parse(localStorage.getItem('omni_sales'));
        sales.splice(index, 1);
        localStorage.setItem('omni_sales', JSON.stringify(sales));
        updateSalesTable();
    }
</script>
</body>
</html>
