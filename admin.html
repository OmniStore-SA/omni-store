<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم OmniStore</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; text-align: center; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; border: 1px solid #ff4500; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #3d3d3d; color: white; }
        button { background: #ff4500; color: white; border: none; padding: 15px; cursor: pointer; border-radius: 5px; width: 95%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #ff6a00; }
    </style>
</head>
<body>

<div class="card">
    <h2>إضافة منتج لمتجر أومني</h2>
    <input type="text" id="pName" placeholder="اسم المنتج (مثل: نتفلكس)">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="pImg" placeholder="رابط صورة المنتج">
    
    <label>اختر القسم المناسب:</label>
    <select id="pCategory">
        <option value="entertainment">قسم الترفيه</option>
        <option value="games">قسم الألعاب</option>
        <option value="programs">قسم البرامج</option>
    </select>

    <button onclick="addProduct()">حفظ المنتج في المخزن</button>
</div>

<script>
    // مفتاح الربط الخاص بك الذي استخرجناه سابقاً
    const firebaseConfig = {
      apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
      authDomain: "omnistore-a5251.firebaseapp.com",
      databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
      projectId: "omnistore-a5251",
      storageBucket: "omnistore-a5251.firebasestorage.app",
      messagingSenderId: "542087784992",
      appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;
        const category = document.getElementById('pCategory').value;

        if(name && price && img) {
            db.ref('products').push({
                name: name,
                price: price,
                image: img,
                category: category
            }).then(() => {
                alert("تمت إضافة " + name + " بنجاح في " + (category === 'entertainment' ? 'قائمة الترفيه' : 'قسم آخر'));
                location.reload();
            });
        } else {
            alert("عبّي البيانات يا بطل");
        }
    }
</script>
</body>
</html>
