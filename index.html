<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Store - الفخامة الرقمية</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #c7a13c; --secondary: #8a2be2; --bg: #0a0a0a; }
        
        /* أنميشن دخول المتجر */
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        /* أنميشن انتقال سريع للقسم */
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        /* تنسيق الهيدر مع اللوجو الجديد */
        header { text-align: center; padding: 15px; background: #000; border-bottom: 2px solid var(--primary); }
        .logo { height: 80px; filter: drop-shadow(0 0 5px var(--primary)); }

        /* الصفحة الرئيسية: الصورة التفاعلية فقط */
        .main-page { display: block; text-align: center; }
        .hero-container {
            width: 100vw;
            height: calc(100vh - 120px); /* ملء الشاشة مع ترك مساحة للهيدر */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-image { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* مناطق الضغط فوق الأقسام الأربعة (المحددة بالأزرق) */
        .map-overlay { position: absolute; bottom: 5%; width: 90%; height: 30%; display: flex; gap: 5px; }
        .map-area { flex: 1; cursor: pointer; border-radius: 10px; }
        .map-area:hover { background: rgba(199, 161, 60, 0.1); }

        /* صفحة القسم (مخفية في البداية) */
        .section-page { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: var(--bg); 
            z-index: 100; 
            padding-top: 20px;
            animation: slideIn 0.4s ease-out;
            overflow-y: auto;
        }

        .section-header { 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            background: #111; 
            border-bottom: 2px solid var(--primary);
            position: sticky; top: 0; z-index: 101;
        }

        .back-btn { 
            background: var(--primary); 
            color: black; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-left: 15px;
        }

        /* شبكة المنتجات داخل القسم */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; padding-bottom: 100px; }
        .product-card { background: #161616; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #222; }
        .product-card img { width: 100%; border-radius: 8px; height: 120px; object-fit: cover; }
        .price { color: var(--primary); font-weight: bold; font-size: 1.1em; margin: 10px 0; display: block; }
        .buy-btn { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }

        /* سلة المشتريات */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; padding: 15px; border-top: 2px solid var(--primary); display: none; justify-content: space-between; align-items: center; z-index: 200; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <img src="لوقو متجر اومني .jpeg" class="logo" alt="Omni Logo"> </header>

<div class="main-page" id="homePage">
    <div class="hero-container">
        <img src="اومني القائمه الاوله.jpeg" class="hero-image">
        <div class="map-overlay">
            <div class="map-area" onclick="openSection('cards', 'بطاقات وهدايا واشتراكات أخرى')"></div>
            <div class="map-area" onclick="openSection('social', 'دعم السوشال ميديا')"></div>
            <div class="map-area" onclick="openSection('ai', 'أدوات الذكاء الاصطناعي')"></div>
            <div class="map-area" onclick="openSection('entertainment', 'ترفيه بلا حدود')"></div>
        </div>
    </div>
</div>

<div class="section-page" id="sectionPage">
    <div class="section-header">
        <button class="back-btn" onclick="closeSection()">🔙 عودة</button>
        <h2 id="sectionTitle" style="margin: 0; color: var(--primary);">اسم القسم</h2>
    </div>
    <div class="products-grid" id="sectionProducts">
        </div>
</div>

<div class="cart-bar" id="cartBar">
    <div id="cartCount" style="color: var(--primary); font-weight: bold;">السلة: 0 منتجات</div>
    <button class="buy-btn" style="width: auto; padding: 10px 25px;" onclick="sendOrder()">طلب عبر واتساب 💬</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
      authDomain: "omnistore-a5251.firebaseapp.com",
      databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
      projectId: "omnistore-a5251",
      storageBucket: "omnistore-a5251.firebasestorage.app",
      appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let cart = [];
    let allProducts = [];

    // جلب المنتجات في الخلفية
    db.ref('products').on('value', (snapshot) => {
        const data = snapshot.val();
        allProducts = [];
        for (let id in data) { allProducts.push(data[id]); }
    });

    // دالة فتح القسم
    function openSection(cat, title) {
        document.getElementById('sectionTitle').innerText = title;
        const display = document.getElementById('sectionProducts');
        display.innerHTML = '';
        
        const filtered = allProducts.filter(p => p.category === cat);
        
        if(filtered.length === 0) {
            display.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 50px;">قريباً... يتم إضافة المنتجات الملكية لهذا القسم</p>';
        } else {
            filtered.forEach(p => {
                display.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image}">
                        <h3>${p.name}</h3>
                        <p style="font-size: 0.85em; color: #aaa;">${p.description}</p>
                        <span class="price">${p.price} ريال</span>
                        <button class="buy-btn" onclick="addToCart('${p.name}', '${p.price}')">أضف للسلة</button>
                    </div>`;
            });
        }
        
        document.getElementById('sectionPage').style.display = 'block';
        document.body.style.overflow = 'hidden'; // منع التمرير في الخلفية
    }

    // دالة العودة
    function closeSection() {
        document.getElementById('sectionPage').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cartBar').style.display = 'flex';
        document.getElementById('cartCount').innerText = `السلة: ${cart.length} منتجات`;
        alert("تمت الإضافة بنجاح!");
    }

    function sendOrder() {
        let msg = "طلب جديد من Omni Store:\n";
        cart.forEach(i => msg += `- ${i.name} (${i.price} ريال)\n`);
        window.open(`https://wa.me/966550000000?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
