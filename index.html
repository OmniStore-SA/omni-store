<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        header { position: fixed; top: 10px; left: 5%; width: 90%; height: 60px; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1000; }
        .nav-icon { font-size: 26px; color: #d4af37; cursor: pointer; }
        #main-content { padding-top: 100px; }
        .container { padding: 0 15px 50px; }
        .cat-item { margin-bottom: 30px; text-align: center; cursor: pointer; border: 1px solid #1a1a1a; border-radius: 20px; padding: 10px; transition: 0.3s; }
        .cat-item:active { transform: scale(0.95); background: #111; }
        .cat-item img { width: 100%; border-radius: 15px; aspect-ratio: 2/1; object-fit: cover; }
        .cat-label { color: #d4af37; font-weight: bold; margin-top: 10px; font-size: 1.2rem; }
        #section-view { display: none; padding: 100px 15px 50px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; }
        .product-card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh; background: #0a0a0a; z-index: 3000; border-top: 2px solid #d4af37; border-radius: 25px 25px 0 0; transition: 0.4s; padding: 25px; overflow-y: auto; }
        .modal.active { bottom: 0; }
        .btn-main { background: #d4af37; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; margin-top: 15px; cursor: pointer; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
        
        /* القائمة الجانبية */
        #side-menu { position: fixed; top: 0; right: -100%; width: 80%; height: 100vh; background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(15px); z-index: 2000; transition: 0.4s; padding: 30px 20px; border-left: 2px solid #d4af37; }
        #side-menu.active { right: 0; }
        .menu-logo-container { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; border: 2px solid #d4af37; overflow: hidden; }
        .menu-logo { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="nav-icon" onclick="toggleMenu()">&#9776;</div>
        <div id="main-title" style="color:#d4af37; font-weight:900;">متجر أومني</div>
        <div id="back-btn" style="display:none; cursor:pointer;" onclick="goHome()">➡️ رجوع</div>
        <div class="nav-icon" onclick="toggleCart()" style="position:relative;">
            🛒 <span id="cart-count" style="font-size:12px; background:red; color:white; padding:2px 6px; border-radius:50%; position:absolute; top:-5px; right:-10px;">0</span>
        </div>
    </header>

    <div id="overlay" onclick="closeAll()"></div>

    <div id="side-menu">
        <div class="menu-logo-container"><img src="لوقو المتجر.png" class="menu-logo" onerror="this.src=''"></div>
        <ul style="list-style:none;">
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم الترفيه'); closeAll();">🍿 قسم الترفيه</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم انستا'); closeAll();">📸 قسم انستقرام</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم تيك توك'); closeAll();">📱 قسم تيك توك</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم ستيم أوفلاين'); closeAll();">🕹️ ستيم أوفلاين</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم الذكاء الاصطناعي'); closeAll();">🤖 الذكاء الاصطناعي</li>
            <li style="padding:15px;"><a href="https://wa.me/966548512295" style="color:#25d366; text-decoration:none;">💬 تواصل واتساب</a></li>
        </ul>
    </div>

    <div id="main-content">
        <div class="container">
            <div class="cat-item" onclick="openSection('قسم الترفيه')"><img src="قسم اشتراكات الترفيه.png" onerror="this.src=''"><div class="cat-label">قسم الترفيه</div></div>
            <div class="cat-item" onclick="openSection('قسم انستا')"><img src="قسم انستا .png" onerror="this.src=''"><div class="cat-label">قسم انستقرام</div></div>
            <div class="cat-item" onclick="openSection('قسم تيك توك')"><img src="قسم تيك توك .png" onerror="this.src=''"><div class="cat-label">قسم تيك توك</div></div>
            <div class="cat-item" onclick="openSection('قسم ستيم أوفلاين')"><img src="قسم ستيم اوفلاين.png" onerror="this.src=''"><div class="cat-label">ستيم أوفلاين</div></div>
            <div class="cat-item" onclick="openSection('قسم الذكاء الاصطناعي')"><img src="قسم الذكاء الاصطناعي .png" onerror="this.src=''"><div class="cat-label">الذكاء الاصطناعي</div></div>
        </div>
    </div>

    <div id="section-view">
        <h2 id="sec-title" style="text-align:center; color:#d4af37; margin-bottom:20px;"></h2>
        <div class="product-grid" id="products-list"></div>
    </div>

    <div id="product-modal" class="modal">
        <div id="modal-body"></div>
        <button class="btn-main" onclick="addToCartFromModal()">إضافة للسلة 🛒</button>
        <button class="btn-main" style="background:#333; color:white;" onclick="closeAll()">إغلاق</button>
    </div>

    <div id="cart-modal" class="modal">
        <h2 style="color:#d4af37; margin-bottom:20px;">سلة المشتريات</h2>
        <div id="cart-items" style="margin-bottom:15px;"></div>
        <div style="font-size:1.2rem; color:#d4af37; font-weight:bold;">المجموع: <span id="cart-total">0</span> ريال</div>
        
        <div style="margin-top:20px;">
            <input type="text" id="user-name" placeholder="الاسم (إجباري)" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:white; border-radius:8px; font-family:'Cairo';">
            <input type="tel" id="user-phone" placeholder="رقم الهاتف (إجباري)" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:white; border-radius:8px; font-family:'Cairo';">
            
            <h3 style="color:#d4af37; margin:15px 0 10px; font-size:1rem;">طريقة الدفع:</h3>
            <label><input type="radio" name="bank" value="الراجحي" checked> الراجحي</label><br>
            <label><input type="radio" name="bank" value="STC Pay"> STC Pay</label><br>
            <label><input type="radio" name="bank" value="تطبيق برق"> تطبيق برق</label>
        </div>

        <button class="btn-main" style="background:#25d366; color:white;" onclick="checkout()">إرسال الطلب واتساب 💬</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQjyV07I",
            authDomain: "omnistore-a5251.firebaseapp.com",
            databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
            projectId: "omnistore-a5251",
            storageBucket: "omnistore-a5251.appspot.com",
            messagingSenderId: "542087784992",
            appId: "1:542087784992:web:8a83435b3ef36678c3aa45"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.allProducts = [];
        window.currentProduct = null;
        window.cart = [];

        // جلب البيانات من فايربيس
        onValue(ref(db, 'products'), (snapshot) => {
            const data = snapshot.val();
            window.allProducts = [];
            if (data) {
                for (let id in data) {
                    window.allProducts.push({ id, ...data[id] });
                }
            }
            
            // تحديث العرض تلقائياً إذا كان المستخدم فاتح قسم معين
            let currentSec = document.getElementById('sec-title').innerText;
            if(currentSec && document.getElementById('section-view').style.display === 'block') {
                window.openSection(currentSec);
            }
        });

        // دالة فتح القسم والبحث الذكي
        window.openSection = function(categoryName) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('section-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('sec-title').innerText = categoryName;

            const list = document.getElementById('products-list');
            list.innerHTML = '';

            // الربط الذكي بين اسم القسم في الموقع واسمه في قاعدة البيانات
            const categoryMap = {
                'قسم الترفيه': 'social',
                'قسم انستا': 'social',
                'قسم تيك توك': 'social',
                'قسم ستيم أوفلاين': 'steam_offline',
                'قسم الذكاء الاصطناعي': 'ai'
            };

            const targetDbName = categoryMap[categoryName];

            const filtered = window.allProducts.filter(p => {
                let dbCat = (p.category || "").toLowerCase().trim();
                return dbCat === targetDbName || dbCat === categoryName || dbCat.includes(categoryName.replace('قسم ', ''));
            });

            if (filtered.length === 0) {
                list.innerHTML = '<p style="grid-column:1/-1; text-align:center;">لا توجد منتجات حالياً في هذا القسم.</p>';
            } else {
                filtered.forEach(p => {
                    list.innerHTML += `
                        <div class="product-card" onclick="showDetails('${p.id}')">
                            <img src="${p.image || ''}" onerror="this.src='لوقو المتجر.png'">
                            <h3 style="font-size:0.9rem; margin-top:8px;">${p.name}</h3>
                            <p style="color:#d4af37; font-weight:bold;">${p.price} ريال</p>
                        </div>`;
                });
            }
        };

        window.showDetails = function(id) {
            const p = window.allProducts.find(x => x.id === id);
            window.currentProduct = p;
            document.getElementById('modal-body').innerHTML = `
                <img src="${p.image || ''}" style="width:100%; border-radius:15px;" onerror="this.src='لوقو المتجر.png'">
                <h2 style="color:#d4af37; margin-top:15px;">${p.name}</h2>
                <p style="margin:10px 0; font-size:0.9rem; color:#ccc;">${p.description || 'لا يوجد وصف'}</p>
                <p style="font-size:1.5rem; font-weight:bold;">${p.price} ريال</p>
            `;
            document.getElementById('product-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        };

        window.addToCartFromModal = function() {
            window.cart.push(window.currentProduct);
            updateCart();
            alert('تمت الإضافة للسلة بنجاح!');
            closeAll();
        };

        window.updateCart = function() {
            document.getElementById('cart-count').innerText = window.cart.length;
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = '';
            let total = 0;
            window.cart.forEach(item => {
                total += parseFloat(item.price) || 0;
                itemsDiv.innerHTML += `<div style="border-bottom:1px solid #333; padding:10px 0;">${item.name} - <span style="color:#d4af37;">${item.price} ريال</span></div>`;
            });
            document.getElementById('cart-total').innerText = total;
        };

        window.checkout = function() {
            if(window.cart.length === 0) return alert('السلة فارغة!');
            let name = document.getElementById('user-name').value;
            let phone = document.getElementById('user-phone').value;
            if(!name || !phone) return alert('يرجى إدخال الاسم ورقم الهاتف!');

            let bank = document.querySelector('input[name="bank"]:checked').value;
            let orderId = Math.floor(Math.random() * 900000) + 100000;
            
            let msg = `*طلب جديد #${orderId}*\nالاسم: ${name}\nالجوال: ${phone}\n\n*الطلبات:*\n`;
            window.cart.forEach(i => msg += `- ${i.name}\n`);
            msg += `\n*المجموع: ${document.getElementById('cart-total').innerText} ريال*\n*طريقة الدفع:* ${bank}`;
            
            window.open(`https://wa.me/966548512295?text=${encodeURIComponent(msg)}`);
        };

        window.goHome = function() {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('section-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('main-title').style.display = 'block';
        };

        window.toggleMenu = function() { document.getElementById('side-menu').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; };
        window.toggleCart = function() { document.getElementById('cart-modal').classList.add('active'); document.getElementById('overlay').style.display = 'block'; };
        window.closeAll = function() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('side-menu').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        };
    </script>
</body>
</html>
