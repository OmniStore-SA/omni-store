<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        header { position: fixed; top: 10px; left: 5%; width: 90%; height: 60px; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1000; }
        .nav-icon { font-size: 24px; color: var(--gold); cursor: pointer; }
        #main-content { padding-top: 100px; }
        .container { padding: 0 15px 50px; }
        .cat-item { margin-bottom: 25px; text-align: center; cursor: pointer; border: 1px solid #1a1a1a; border-radius: 20px; padding: 10px; transition: 0.3s; background: var(--card); }
        .cat-item img { width: 100%; border-radius: 15px; aspect-ratio: 2/1; object-fit: cover; }
        .cat-label { color: var(--gold); font-weight: bold; margin-top: 10px; font-size: 1.1rem; }
        #section-view { display: none; padding: 100px 15px 50px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; }
        .product-card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 8px; }
        
        /* Modals */
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh; background: #0a0a0a; z-index: 3000; border-top: 2px solid var(--gold); border-radius: 25px 25px 0 0; transition: 0.4s; padding: 20px; overflow-y: auto; }
        .modal.active { bottom: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
        .btn-main { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; margin-top: 10px; cursor: pointer; }
        
        /* Options & Extras */
        .option-box { background: #111; padding: 12px; border-radius: 10px; margin: 15px 0; border: 1px solid #222; text-align: right; }
        .option-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; font-size: 0.9rem; }
        .extra-img-thumb { width: 70px; height: 70px; border-radius: 8px; border: 1px solid #333; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="nav-icon" onclick="toggleMenu()">☰</div>
        <div id="main-title" style="color:var(--gold); font-weight:900; font-size:1.2rem;">OMNI STORE</div>
        <div id="back-btn" style="display:none; color:var(--gold); font-weight:bold;" onclick="goHome()">⬅ رجوع</div>
        <div class="nav-icon" onclick="toggleCart()">🛒 <span id="cart-count" style="font-size:14px;">0</span></div>
    </header>

    <div id="overlay" onclick="closeAll()"></div>

    <div id="main-content">
        <div class="container">
            <div class="cat-item" onclick="openSection('قسم الترفيه')"><img src="قسم اشتراكات الترفيه.png"><div class="cat-label">قسم الترفيه</div></div>
            <div class="cat-item" onclick="openSection('قسم انستا')"><img src="قسم انستا .png"><div class="cat-label">قسم انستقرام</div></div>
            <div class="cat-item" onclick="openSection('قسم تيك توك')"><img src="قسم تيك توك .png"><div class="cat-label">قسم تيك توك</div></div>
            <div class="cat-item" onclick="openSection('قسم ستيم أوفلاين')"><img src="قسم ستيم اوفلاين.png"><div class="cat-label">ستيم أوفلاين</div></div>
            <div class="cat-item" onclick="openSection('قسم الذكاء الاصطناعي')"><img src="قسم الذكاء الاصطناعي .png"><div class="cat-label">الذكاء الاصطناعي</div></div>
        </div>
    </div>

    <div id="section-view">
        <h2 id="sec-title" style="text-align:center; color:var(--gold); margin-bottom:20px;"></h2>
        <div class="product-grid" id="products-list"></div>
    </div>

    <div id="product-modal" class="modal">
        <div id="modal-body"></div>
        <button class="btn-main" onclick="addToCartFromModal()">إضافة للسلة 🛒</button>
        <button class="btn-main" style="background:#222; color:white;" onclick="closeAll()">إغلاق</button>
    </div>

    <div id="cart-modal" class="modal">
        <h2 style="color:var(--gold); margin-bottom:15px;">سلتك</h2>
        <div id="cart-items" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
        <div style="font-size:1.2rem; font-weight:bold; color:var(--gold);">المجموع: <span id="cart-total">0</span> ريال</div>
        <input type="text" id="user-name" placeholder="الاسم الكامل" style="width:100%; padding:12px; margin-top:10px; background:#111; color:white; border:1px solid #333; border-radius:10px;">
        <button class="btn-main" style="background:#25d366; color:white;" onclick="checkout()">إرسال الطلب (واتساب) 💬</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQjyV07I",
            authDomain: "omnistore-a5251.firebaseapp.com",
            databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
            projectId: "omnistore-a5251",
            storageBucket: "omnistore-a5251.appspot.com",
            messagingSenderId: "542087784992",
            appId: "1:542087784992:web:8a83435b3ef36678c3aa45"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.allProducts = [];
        window.cart = [];
        window.currentProduct = null;

        // جلب البيانات
        onValue(ref(db, 'products'), (snapshot) => {
            const data = snapshot.val();
            window.allProducts = [];
            for (let id in data) { window.allProducts.push({ id, ...data[id] }); }
        });

        window.openSection = function(categoryName) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('section-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('sec-title').innerText = categoryName;

            const list = document.getElementById('products-list');
            list.innerHTML = '';

            const categoryMap = { 
                'قسم الترفيه': ['social', 'entertainment'], 
                'قسم انستا': ['insta', 'social'], 
                'قسم تيك توك': ['tiktok', 'social'], 
                'قسم ستيم أوفلاين': ['steam_offline'], 
                'قسم الذكاء الاصطناعي': ['ai'] 
            };
            const targets = categoryMap[categoryName] || [];

            const filtered = window.allProducts.filter(p => targets.includes(p.category) || p.category === categoryName);

            filtered.forEach(p => {
                list.innerHTML += `
                <div class="product-card" onclick="showDetails('${p.id}')">
                    <img src="${p.image || 'logo.png'}" onerror="this.src='logo.png'">
                    <div style="font-weight:bold; font-size:0.85rem; height:40px; overflow:hidden;">${p.name}</div>
                    <div style="color:var(--gold); margin-top:5px;">${p.price} ريال</div>
                </div>`;
            });
        };

        window.showDetails = function(id) {
            const p = window.allProducts.find(x => x.id === id);
            window.currentProduct = p;
            let content = `<img src="${p.image || ''}" style="width:100%; border-radius:15px; margin-bottom:15px;">`;
            
            if(p.extraImages) {
                content += `<div style="display:flex; gap:8px; overflow-x:auto; margin-bottom:15px;">`;
                p.extraImages.split(',').forEach(img => {
                    content += `<img src="${img.trim()}" class="extra-img-thumb">`;
                });
                content += `</div>`;
            }

            content += `<h2 style="color:var(--gold);">${p.name}</h2>`;
            content += `<p style="color:#aaa; font-size:0.9rem; margin:10px 0;">${p.description || 'لا يوجد وصف'}</p>`;

            if(p.options) {
                content += `<div class="option-box"><p style="color:var(--gold); margin-bottom:8px;">اختر النوع:</p>`;
                p.options.split(',').forEach((opt, i) => {
                    let [name, price] = opt.split(':');
                    content += `<label class="option-item"><input type="radio" name="p-opt" value="${name}" data-add="${price || 0}" ${i===0?'checked':''}> ${name} (${price || 0} ريال إضافي)</label>`;
                });
                content += `</div>`;
            }

            content += `<div style="font-size:1.4rem; font-weight:900;">السعر الأساسي: ${p.price} ريال</div>`;
            document.getElementById('modal-body').innerHTML = content;
            document.getElementById('product-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        };

        window.addToCartFromModal = function() {
            let p = {...window.currentProduct};
            const opt = document.querySelector('input[name="p-opt"]:checked');
            if(opt) {
                p.name += ` - ${opt.value}`;
                p.price = (parseFloat(p.price) + parseFloat(opt.dataset.add)).toString();
            }
            window.cart.push(p);
            updateCart();
            closeAll();
        };

        window.updateCart = function() {
            document.getElementById('cart-count').innerText = window.cart.length;
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;
            window.cart.forEach((item, idx) => {
                total += parseFloat(item.price);
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
                    <span>${item.name}</span>
                    <span style="color:var(--gold)">${item.price} ريال <button onclick="removeFromCart(${idx})" style="background:none; border:none; color:red; margin-right:10px;">✕</button></span>
                </div>`;
            });
            document.getElementById('cart-total').innerText = total;
        };

        window.removeFromCart = (idx) => { window.cart.splice(idx, 1); updateCart(); };
        window.goHome = () => { location.reload(); };
        window.closeAll = () => { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); document.getElementById('overlay').style.display = 'none'; };
        window.toggleCart = () => { document.getElementById('cart-modal').classList.add('active'); document.getElementById('overlay').style.display = 'block'; };
        window.checkout = () => {
            if(window.cart.length === 0) return alert('السلة فارغة!');
            const name = document.getElementById('user-name').value;
            if(!name) return alert('يرجى كتابة الاسم');
            let msg = `*طلب جديد من متجر أومني*\n*العميل:* ${name}\n\n*الطلبات:*\n`;
            window.cart.forEach(i => msg += `- ${i.name} (${i.price} ريال)\n`);
            msg += `\n*المجموع الكلي: ${document.getElementById('cart-total').innerText} ريال*`;
            window.open(`https://wa.me/966548512295?text=${encodeURIComponent(msg)}`);
        };
    </script>
</body>
</html>
