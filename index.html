<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- الأساسيات والمؤثرات --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        .ripple { position: relative; overflow: hidden; }
        .ripple:active:after { content: ""; position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: rgba(255,255,255,0.2); border-radius: 50%; transform: scale(0); animation: ripple-animation 0.5s linear; }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        /* --- الهيدر (توزيعك المعتمد) --- */
        header {
            position: fixed; top: 10px; left: 2.5%; width: 95%; height: 60px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000;
        }
        .header-right { flex: 1; display: flex; justify-content: flex-start; }
        .header-center { flex: 2; display: flex; justify-content: center; align-items: center; }
        .header-left { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 12px; }

        .header-title { color: #d4af37; font-weight: 900; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .saudi-flag { width: 22px; }
        .nav-icon { font-size: 26px; color: #d4af37; cursor: pointer; }
        .back-btn { font-size: 26px; color: #fff; cursor: pointer; display: none; }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: red; color: white; font-size: 11px; width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        /* --- المنيو والمحتوى --- */
        #side-menu { position: fixed; top: 0; right: -100%; width: 80%; height: 100vh; background: #050505; z-index: 2000; transition: 0.4s; padding: 30px 20px; border-left: 2px solid #d4af37; }
        #side-menu.active { right: 0; }
        .menu-logo-container { width: 90px; height: 90px; margin: 0 auto 20px; border-radius: 50%; border: 2px solid #d4af37; overflow: hidden; }
        .menu-logo { width: 100%; height: 100%; object-fit: cover; }
        
        #main-content { padding-top: 100px; }
        .hero-banner { width: 92%; margin: 0 auto 30px; display: block; border-radius: 20px; border: 1px solid #222; }
        .container { padding: 0 15px 50px; }
        .cat-item { margin-bottom: 30px; text-align: center; cursor: pointer; }
        .cat-item img { width: 100%; border-radius: 20px; border: 1px solid #1a1a1a; aspect-ratio: 2/1; object-fit: cover; }
        
        #section-view { display: none; padding: 100px 15px 50px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; }
        .product-card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; }

        /* --- النوافذ --- */
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh; background: #0a0a0a; z-index: 3000; border-top: 2px solid #d4af37; border-radius: 25px 25px 0 0; transition: 0.4s; padding: 25px 20px; overflow-y: auto; }
        .modal.active { bottom: 0; }
        .variant-box { background: #111; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #222; }
        .custom-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 10px; font-family: 'Cairo'; }
        .btn-main { background: #d4af37; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 1rem; cursor: pointer; }
        .steam-instructions img { width: 100%; border-radius: 10px; margin-top: 8px; border: 1px solid #333; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-right"><div class="nav-icon ripple" onclick="toggleMenu()">&#8942;</div></div>
        <div class="header-center"><div class="header-title"><img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" class="saudi-flag"> متجر أومني</div></div>
        <div class="header-left">
            <div class="cart-wrapper ripple" onclick="toggleCart()" style="position:relative;"><div class="nav-icon">🛒</div><div class="cart-badge" id="cart-count">0</div></div>
            <div class="back-btn ripple" id="back-btn" onclick="goHome()">&#8594;</div>
        </div>
    </header>

    <div id="overlay" onclick="closeAll()"></div>

    <div id="side-menu">
        <div class="menu-logo-container"><img src="لوقو المتجر.jpeg" class="menu-logo"></div>
        <ul style="list-style:none;">
            <li style="padding:15px; border-bottom:1px solid #222;" class="ripple" onclick="goHome(); closeAll();">🏠 الرئيسية</li>
            <li style="padding:15px; border-bottom:1px solid #222;" class="ripple" onclick="openSection('قسم ستيم أوفلاين'); closeAll();">🕹️ ستيم أوفلاين</li>
            <li style="padding:15px; border-bottom:1px solid #222;" class="ripple" onclick="openSection('قسم انستا'); closeAll();">📸 انستقرام</li>
            <li style="padding:15px; border-bottom:1px solid #222;" class="ripple" onclick="openSection('قسم تيك توك'); closeAll();">📱 تيك توك</li>
            <li style="padding:15px; border-bottom:1px solid #222;" class="ripple" onclick="window.open('https://wa.me/966548512295')">💬 الدعم الفني</li>
        </ul>
    </div>

    <div id="main-content">
        <img src="القائمه الرئيسيه .jpeg" class="hero-banner">
        <div class="container">
            <div class="cat-item ripple" onclick="openSection('قسم ستيم أوفلاين')"><img src="قسم ستيم اوفلاين.jpeg"><div class="cat-label">ستيم أوفلاين</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم انستا')"><img src="قسم انستا .jpeg"><div class="cat-label">انستقرام</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم تيك توك')"><img src="قسم تيك توك .jpeg"><div class="cat-label">تيك توك</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم الترفيه')"><img src="قسم اشتراكات الترفيه.jpeg"><div class="cat-label">الترفيه</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم الذكاء الاصطناعي')"><img src="قسم الذكاء الاصطناعي .jpeg"><div class="cat-label">الذكاء الاصطناعي</div></div>
        </div>
    </div>

    <div id="section-view"><h2 id="st" style="text-align:center; color:#d4af37; margin-bottom:20px;"></h2><div class="product-grid" id="products-list"></div></div>
    <div id="product-detail-modal" class="modal"><div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left;">✖</div><div id="detail-content"></div></div>
    <div id="cart-modal" class="modal"><div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left;">✖</div><h2 style="color:#d4af37; margin-bottom:20px;">السلة</h2><div id="cart-items"></div><button class="btn-main ripple" onclick="checkout()">تأكيد الطلب</button></div>

    <script>
        const storeData = {
            'قسم ستيم أوفلاين': [{ id: 'cs25', name: 'Cinema Simulator 2025', price: 15, img: 'منتج لعبه  اوفلاين Cinema Simulator 2025.jpg', desc: 'لعبة نظامية.<div class="steam-instructions"><img src="ستيم 1 .jpeg"> <img src="سستيم 2 .jpeg"></div>' }],
            'قسم انستا': [
                { id: 'igv', name: 'مشاهدات انستا', price: '5', img: 'قسم انستا .jpeg', variants: [{n: '1000 مشاهدة', p: 5}, {n: '5000 مشاهدة', p: 15}], allowCustom: true },
                { id: 'igf', name: 'متابعين انستا', price: '7', img: 'قسم انستا .jpeg', variants: [{n: '1000 متابع', p: 7}] }
            ],
            'قسم تيك توك': [
                { id: 'tkv', name: 'مشاهدات تيك توك', price: '5', img: 'قسم تيك توك .jpeg', variants: [{n: '1000 مشاهدة', p: 5}, {n: '5000 مشاهدة', p: 15}], allowCustom: true },
                { id: 'tkf', name: 'متابعين تيك توك', price: '10', img: 'قسم تيك توك .jpeg', variants: [{n: '1000 متابع', p: 10}] }
            ],
            'قسم الترفيه': [{ id: 'yt', name: 'يوتيوب بريميوم', price: 12, img: 'قسم اشتراكات الترفيه.jpeg', variants: [{n: 'شهر', p: 12}] }],
            'قسم الذكاء الاصطناعي': [{ id: 'gpt', name: 'ChatGPT Plus', price: 45, img: 'قسم الذكاء الاصطناعي .jpeg' }]
        };

        let cart = [];
        function openSection(n) {
            document.getElementById('main-content').style.display='none'; document.getElementById('section-view').style.display='block';
            document.getElementById('back-btn').style.display='block'; document.getElementById('st').innerText = n;
            const l = document.getElementById('products-list'); l.innerHTML = '';
            storeData[n].forEach(p => { l.innerHTML += `<div class="product-card ripple" onclick="showProductDetails('${n}', '${p.id}')"><img src="${p.img}"><h3>${p.name}</h3><div style="color:#d4af37;">${p.price} ريال</div></div>`; });
        }

        function showProductDetails(cat, id) {
            const p = storeData[cat].find(x => x.id === id);
            let varHtml = '';
            if(p.variants) {
                varHtml = `<div class="variant-box">`;
                p.variants.forEach(v => { varHtml += `<label style="display:block; margin:10px 0;"><input type="radio" name="pv" value="${v.n}" data-p="${v.p}"> ${v.n} - ${v.p} ريال</label>`; });
                if(p.allowCustom) varHtml += `<input type="number" id="cust" class="custom-input" placeholder="أو اكتب العدد المطلوب">`;
                varHtml += `</div>`;
            }
            document.getElementById('detail-content').innerHTML = `<img src="${p.img}" style="width:100%; border-radius:15px;"><h2 style="margin:15px 0;">${p.name}</h2><div>${p.desc || ''}</div>${varHtml}<button class="btn-main ripple" onclick="addToCart('${cat}','${id}')">إضافة 🛒</button>`;
            document.getElementById('product-detail-modal').classList.add('active'); document.getElementById('overlay').style.display = 'block';
        }

        function addToCart(cat, id) {
            const p = storeData[cat].find(x => x.id === id);
            let finalN = p.name, finalP = p.price;
            if(p.variants) {
                const s = document.querySelector('input[name="pv"]:checked'), c = document.getElementById('cust')?.value;
                if(!s && !c) return alert('اختر العرض!');
                if(c) { finalN += " (عدد: "+c+")"; finalP = 0; } else { finalN += " ("+s.value+")"; finalP = s.dataset.p; }
            }
            cart.push({name: finalN, price: finalP}); document.getElementById('cart-count').innerText = cart.length; closeAll();
        }

        function toggleCart() {
            const list = document.getElementById('cart-items'); list.innerHTML = '';
            cart.forEach(i => { list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #222;">${i.name} - ${i.price} ريال</div>`; });
            document.getElementById('cart-modal').classList.add('active'); document.getElementById('overlay').style.display = 'block';
        }

        function checkout() {
            let m = `*طلب جديد*\n`; cart.forEach(i => m += `- ${i.name}\n`);
            window.open(`https://wa.me/966548512295?text=${encodeURIComponent(m)}`);
        }

        function goHome() { document.getElementById('main-content').style.display='block'; document.getElementById('section-view').style.display='none'; document.getElementById('back-btn').style.display='none'; }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); document.getElementById('side-menu').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
