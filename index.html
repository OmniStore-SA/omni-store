<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أومني - العقل الرقمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* الإعدادات العامة */
        :root { --gold: #d4af37; --black: #000000; --card-bg: #0a0a0a; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        /* 1. شاشة الإعلان (Splash Screen) - بمقاس الجوال */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: url('صورة دخول المتجر.jpeg') center/cover no-repeat;
            z-index: 10000; display: flex; flex-direction: column; align-items: center;
            transition: opacity 0.8s ease;
        }
        #skip-area {
            position: absolute; top: 20px; width: 120px; height: 50px;
            background: rgba(255,255,255,0); cursor: pointer; z-index: 10001;
        }

        /* 2. الهيدر (الأزرار العلوية) */
        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 999;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .nav-icon { font-size: 24px; color: var(--gold); cursor: pointer; visibility: hidden; }
        #dots-icon { visibility: visible; } /* يظهر فقط في الرئيسية */

        /* 3. واجهة المتجر */
        #store-ui { display: none; padding-top: 60px; }
        .hero-img { width: 100%; display: block; }
        
        .container { padding: 15px; }
        .category-item { margin-bottom: 25px; text-align: center; }
        .category-item img { 
            width: 100%; border-radius: 15px; 
            aspect-ratio: 2 / 1; object-fit: cover;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .category-title { color: var(--gold); margin-top: 10px; font-weight: bold; }

        /* نظام السحب العرضي للمنتجات */
        .product-slider {
            display: flex; overflow-x: auto; gap: 10px; padding: 10px 0;
            scrollbar-width: none;
        }
        .product-slider::-webkit-scrollbar { display: none; }
        .product-card {
            min-width: 140px; height: 100px; background: var(--card-bg);
            border: 1px solid #1a1a1a; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }

        /* القائمة الجانبية */
        #side-menu {
            position: fixed; top: 0; right: -100%; width: 70%; height: 100vh;
            background: #050505; z-index: 1000; transition: 0.4s; padding: 20px;
        }
        #side-menu.active { right: 0; }
        .menu-item { display: block; padding: 15px; color: white; text-decoration: none; border-bottom: 1px solid #111; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="skip-area" onclick="enterStore()"></div>
    </div>

    <header>
        <div id="dots-icon" class="nav-icon" onclick="toggleMenu()">&#8942;</div>
        <div id="back-icon" class="nav-icon" onclick="showMain()">&#8594;</div>
    </header>

    <div id="side-menu">
        <div style="text-align: left;" onclick="toggleMenu()">✕</div>
        <a href="#" class="menu-item">حسابي</a>
        <a href="#" class="menu-item">الطلبات</a>
        <a href="#" class="menu-item">تواصل معنا</a>
    </div>

    <div id="store-ui">
        
        <div id="main-page">
            <img src="صورة الرئيسيه.jpeg" class="hero-img">
            <div class="container">
                
                <div class="category-item" onclick="openSection('قسم تيك توك')">
                    <img src="قسم تيك توك .jpeg">
                    <div class="category-title">قسم تيك توك</div>
                </div>

                <div class="category-item" onclick="openSection('قسم انستا')">
                    <img src="قسم انستا .jpeg">
                    <div class="category-title">قسم انستا</div>
                </div>

                <div class="category-item" onclick="openSection('ستيم أونلاين')">
                    <img src="قسم ستيم اولاين .jpeg">
                    <div class="category-title">قسم ستيم أونلاين</div>
                </div>

                <div class="category-item" onclick="openSection('ستيم أوفلاين')">
                    <img src="قسم ستيم اوفلاين.jpeg">
                    <div class="category-title">قسم ستيم أوفلاين</div>
                </div>

                <div class="category-item" onclick="openSection('الذكاء الاصطناعي')">
                    <img src="قسم الذكاء الاصطناعي .jpeg">
                    <div class="category-title">قسم الذكاء الاصطناعي</div>
                </div>

            </div>
        </div>

        <div id="section-page" class="hidden container">
            <h2 id="sec-title" style="color: var(--gold); text-align: center;"></h2>
            <div class="product-slider">
                <div class="product-card">المنتجات قريباً...</div>
                <div class="product-card">المنتجات قريباً...</div>
                <div class="product-card">المنتجات قريباً...</div>
            </div>
        </div>

    </div>

    <script>
        const splash = document.getElementById('splash-screen');
        const store = document.getElementById('store-ui');
        const mainPage = document.getElementById('main-page');
        const sectionPage = document.getElementById('section-page');
        const dots = document.getElementById('dots-icon');
        const back = document.getElementById('back-icon');

        // دخول المتجر
        function enterStore() {
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                store.style.display = 'block';
            }, 800);
        }

        // فتح قسم معين
        function openSection(title) {
            mainPage.classList.add('hidden');
            sectionPage.classList.remove('hidden');
            document.getElementById('sec-title').innerText = title;
            
            // تبديل الأيقونات
            dots.style.visibility = 'hidden';
            back.style.visibility = 'visible';
            window.scrollTo(0,0);
        }

        // العودة للرئيسية
        function showMain() {
            mainPage.classList.remove('hidden');
            sectionPage.classList.add('hidden');
            
            // إعادة الأيقونات
            dots.style.visibility = 'visible';
            back.style.visibility = 'hidden';
        }

        // القائمة الجانبية
        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
        }

        // تلاشي تلقائي بعد 5 ثوانٍ
        setTimeout(() => { if(splash.style.display !== 'none') enterStore(); }, 5000);
    </script>
</body>
</html>
