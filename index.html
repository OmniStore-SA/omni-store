<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أومني للاشتراكات</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* شاشة الدخول */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex;
            align-items: center; justify-content: center;
        }
        .login-card {
            background: #111; padding: 35px; border-radius: 20px;
            border: 2px solid #c7a13c; width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 0 20px rgba(199, 161, 60, 0.2);
        }
        .login-card h2 { color: #c7a13c; margin-bottom: 10px; font-size: 24px; }
        .login-card p { color: #888; font-size: 14px; margin-bottom: 25px; }
        
        input {
            width: 100%; padding: 14px; margin: 10px 0; background: #050505;
            border: 1px solid #333; color: #fff; border-radius: 10px; text-align: center;
            font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #c7a13c; }
        
        .btn-login {
            width: 100%; padding: 14px; background: #c7a13c; color: #000;
            border: none; border-radius: 10px; font-weight: bold; font-size: 16px;
            cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-login:hover { background: #e0b84d; transform: scale(1.02); }

        /* محتوى المتجر الرئيسي */
        #mainStore {
            display: none; padding: 20px; text-align: center;
        }
        .store-header { color: #c7a13c; margin-top: 50px; font-size: 28px; }
        .store-subtitle { color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="login-card">
            <h2>أهلاً بك في أومني</h2>
            <p>يرجى التسجيل للوصول إلى أقوى العروض</p>
            <input type="text" id="userName" placeholder="الاسم الكريم">
            <input type="tel" id="userPhone" placeholder="رقم الجوال (05xxxxxxx)">
            <button class="btn-login" onclick="handleLogin()">دخول للمتجر</button>
        </div>
    </div>

    <div id="mainStore">
        <h1 class="store-header">متجر أومني للاشتراكات</h1>
        <p class="store-subtitle">مرحباً بك مجدداً.. جاري تحميل المنتجات الحصرية</p>
        
        <div style="margin-top: 50px; border: 1px dashed #444; padding: 40px; border-radius: 15px;">
            <p style="color: #666;">قائمة الاشتراكات (يوتيوب، نيتفليكس) ستظهر هنا</p>
        </div>
    </div>

    <script>
        // 1. تهيئة Firebase - استناداً لبيانات مشروعك OmniStore
        const firebaseConfig = {
            apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
            authDomain: "omnistore-a5251.firebaseapp.com",
            databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
            projectId: "omnistore-a5251",
            storageBucket: "omnistore-a5251.firebasestorage.app",
            appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. دالة تسجيل الدخول
        function handleLogin() {
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();

            if (name.length < 3) {
                alert("لطفاً، أدخل اسماً صحيحاً");
                return;
            }
            if (phone.length < 10) {
                alert("يرجى التأكد من رقم الجوال");
                return;
            }

            // حفظ البيانات في قاعدة البيانات
            database.ref('customers/' + phone).set({
                full_name: name,
                phone_number: phone,
                last_login: new Date().toLocaleString('ar-SA')
            }).then(() => {
                // حفظ الجلسة محلياً لعدم تكرار الدخول
                localStorage.setItem('omni_session', JSON.stringify({name, phone}));
                enterStore();
            }).catch((err) => {
                alert("حدث خطأ في الاتصال: " + err.message);
            });
        }

        // 3. دالة الدخول للمتجر
        function enterStore() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainStore').style.display = 'block';
        }

        // 4. التحقق عند تحميل الصفحة
        window.onload = function() {
            const session = localStorage.getItem('omni_session');
            if (session) {
                enterStore();
            }
        };
    </script>

</body>
</html>
