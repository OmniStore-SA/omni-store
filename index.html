<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--black); color: white; margin: 0; overflow: hidden; }

        /* --- شاشة الدخول السينمائية (7 ثواني) --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 1.5s ease-in-out;
        }

        .intro-logo {
            width: 150px; border-radius: 50%;
            animation: logoPulse 2s infinite ease-in-out;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
            margin-bottom: 20px;
        }

        @keyframes logoPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px var(--gold)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 40px var(--gold)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px var(--gold)); }
        }

        .loading-bar-container {
            width: 250px; height: 3px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden; position: relative;
        }

        .loading-bar {
            width: 0%; height: 100%; background: var(--gold);
            box-shadow: 0 0 15px var(--gold);
            animation: fillBar 7s forwards linear;
        }

        @keyframes fillBar { to { width: 100%; } }

        .intro-text {
            margin-top: 15px; font-size: 1.1rem; color: var(--gold);
            letter-spacing: 2px; animation: textFade 1.5s infinite;
        }

        @keyframes textFade { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* --- محتوى المتجر الرئيسي --- */
        #main-content { opacity: 0; transition: opacity 2s ease-in; }

        header { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212,175,55,0.2); }
        .nav-logo img { width: 50px; border-radius: 50%; }

        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.2);
            border-radius: 25px; overflow: hidden; cursor: pointer; position: relative;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        
        .card-info { padding: 20px; background: linear-gradient(transparent, #000); position: absolute; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <img src="لوقو متجر اومني .jpeg" class="intro-logo" alt="OMNI">
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="intro-text">جاري تحضير الفخامة...</div>
    </div>

    <div id="main-content">
        <header>
            <div class="nav-logo"><img src="لوقو متجر اومني .jpeg" alt="OMNI"></div>
            <h2 style="color: var(--gold); margin: 0;">أومني ستور</h2>
            <button style="background: var(--gold); border: none; padding: 8px 20px; border-radius: 10px; font-weight: bold; cursor: pointer;">دخول</button>
        </header>

        <div class="container">
            <h1 style="font-size: 2.5rem; margin-bottom: 40px;">أهلاً بك في عالم <span style="color: var(--gold)">أومني</span></h1>
            <div class="grid">
                <div class="card">
                    <img src="اومني القائمه الاوله.jpeg" alt="ترفيه">
                    <div class="card-info">
                        <h3 style="color: var(--gold)">قسم الترفيه المميز</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // الكود المسؤول عن التوقيت (7 ثواني)
        window.onload = function() {
            setTimeout(function() {
                const intro = document.getElementById('intro-screen');
                const main = document.getElementById('main-content');
                
                // إخفاء الانترو وإظهار المتجر
                intro.style.opacity = '0';
                main.style.opacity = '1';
                
                // منع التمرير أثناء الانترو
                document.body.style.overflow = 'auto';

                // حذف شاشة الانترو نهائياً بعد الاختفاء لعدم ثقل الموقع
                setTimeout(() => {
                    intro.style.display = 'none';
                }, 1500);
            }, 7000); // 7000 ملي ثانية = 7 ثواني
        };
    </script>

</body>
</html>
