<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أومني - العقل الرقمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Section --- */
        body {
            margin: 0;
            background-color: #000000; /* أسود فخم يتناسب مع صورك */
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            overflow-x: hidden;
        }

        /* شاشة البداية (Splash Screen) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 9999;
            background: #000;
        }

        .splash-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* زر تخطي شفاف يوضع فوق كلمة "تخطي" في صورتك */
        #skip-overlay {
            position: absolute;
            top: 2%; /* يغطي منطقة التخطي العلوية */
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 10%;
            background: rgba(255, 255, 255, 0); 
            cursor: pointer;
            z-index: 10000;
        }

        /* واجهة المتجر */
        .hidden { display: none; }

        header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(to bottom, #111, #000);
        }

        .store-logo {
            width: 80px;
            border-radius: 50%;
            border: 2px solid #d4af37; /* إطار ذهبي */
        }

        .hero-banner {
            width: 100%;
            display: block;
        }

        .container { padding: 15px; }

        /* بنرات الأقسام (المقاس الذهبي 2:1) */
        .category-item { margin-bottom: 40px; }

        .banner-wrapper img {
            width: 100%;
            aspect-ratio: 2 / 1; 
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .category-title {
            text-align: center;
            font-size: 1.4rem;
            margin-top: 15px;
            color: #d4af37; /* لون ذهبي */
        }

        /* نظام السحب العرضي (Horizontal Scroll) */
        .product-slider {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 15px 0;
            scrollbar-width: none; /* إخفاء شريط التمرير */
        }

        .product-slider::-webkit-scrollbar { display: none; }

        .product-card {
            min-width: 160px;
            height: 200px;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="skip-overlay" onclick="startStore()"></div>
        <img src="صورة دخول المتجر.jpeg" alt="Splash" class="splash-img">
    </div>

    <div id="main-content" class="hidden">
        <header>
            <img src="لوقو المتجر.jpeg" alt="Omni Logo" class="store-logo">
        </header>

        <section>
            <img src="صورة الرئيسيه.jpeg" alt="الرئيسية" class="hero-banner">
        </section>

        <div class="container">
            
            <div class="category-item">
                <div class="banner-wrapper">
                    <img src="قسم انستا .jpeg" alt="Instagram">
                </div>
                <h2 class="category-title">قسم انستقرام</h2>
                <div class="product-slider">
                    <div class="product-card">قريباً..</div>
                    <div class="product-card">قريباً..</div>
                    <div class="product-card">قريباً..</div>
                </div>
            </div>

            <div class="category-item">
                <div class="banner-wrapper">
                    <img src="قسم تيك توك .jpeg" alt="TikTok">
                </div>
                <h2 class="category-title">قسم تيك توك</h2>
                <div class="product-slider">
                    <div class="product-card">قريباً..</div>
                    <div class="product-card">قريباً..</div>
                </div>
            </div>

            <div class="category-item">
                <div class="banner-wrapper">
                    <img src="قسم الذكاء الاصطناعي .jpeg" alt="AI">
                </div>
                <h2 class="category-title">قسم الذكاء الاصطناعي</h2>
            </div>

        </div>
    </div>

    <script>
        /* --- JavaScript Section --- */
        function startStore() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');

            // تأثير التلاشي (Fade Out) لمدة 0.8 ثانية
            splash.style.transition = "opacity 0.8s ease";
            splash.style.opacity = "0";

            setTimeout(() => {
                splash.style.display = "none";
                main.classList.remove('hidden');
                window.scrollTo(0, 0);
            }, 800);
        }

        // تلاشي تلقائي بعد 5 ثوانٍ
        setTimeout(() => {
            if (document.getElementById('splash-screen').style.display !== "none") {
                startStore();
            }
        }, 5000);
    </script>
</body>
</html>
