<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات المتجر العامة */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; color: white; 
            font-family: 'Cairo', sans-serif; 
            overflow-x: hidden; 
        }

        /* الشريط العلوي الفخم */
        header {
            position: fixed; top: 10px; left: 5%; width: 90%; height: 60px;
            background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .header-title {
            color: #d4af37; font-weight: 900; font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            display: flex; align-items: center; gap: 8px;
        }

        /* علم السعودية المتحرك */
        .saudi-flag {
            width: 22px; animation: wave 2s infinite ease-in-out;
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0) translateY(0); }
            50% { transform: rotate(10deg) translateY(-3px); }
        }

        .menu-dots { font-size: 28px; color: #d4af37; cursor: pointer; }
        .back-arrow { font-size: 26px; color: #fff; cursor: pointer; display: none; }

        /* القائمة الجانبية */
        #side-menu {
            position: fixed; top: 0; right: -100%; width: 75%; height: 100vh;
            background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(15px);
            z-index: 1001; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px; border-left: 2px solid #d4af37;
        }
        #side-menu.active { right: 0; }

        .menu-header { text-align: center; margin-bottom: 30px; }
        .menu-logo {
            width: 100px; height: 100px; border-radius: 50%;
            border: 2px solid #d4af37; padding: 5px; margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); object-fit: cover;
        }

        .menu-list { list-style: none; }
        .menu-list li {
            padding: 15px; border-bottom: 1px solid #1a1a1a;
            font-size: 1rem; color: #fff; cursor: pointer;
        }

        /* المحتوى الرئيسي */
        #store-content { padding-top: 85px; }

        /* الصورة التي أرفقتها (البنر الرئيسي) */
        .main-banner {
            width: 92%; margin: 0 auto 25px; display: block;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #222;
        }

        .container { padding: 0 15px 40px; }
        .category-card { margin-bottom: 30px; cursor: pointer; transition: 0.3s; }
        .category-card:active { transform: scale(0.97); }
        .category-card img {
            width: 100%; border-radius: 20px; aspect-ratio: 2 / 1;
            object-fit: cover; border: 1px solid #1a1a1a;
        }
        .cat-name {
            text-align: center; color: #d4af37; font-weight: bold;
            font-size: 1.2rem; margin-top: 10px;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0,0,0,0.8); z-index: 1000; display: none;
        }
    </style>
</head>
<body>

    <header>
        <div id="header-branding" class="header-title">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" class="saudi-flag">
            متجر أومني
        </div>
        <div id="back-icon" class="back-arrow" onclick="goBackMain()">&#8594;</div>
        <div class="menu-dots" onclick="toggleMenu()">&#8942;</div>
    </header>

    <div id="overlay" onclick="toggleMenu()"></div>
    <div id="side-menu">
        <div class="menu-header">
            <img src="لوقو المتجر.jpeg" class="menu-logo">
            <div style="color: #d4af37; font-weight: 900;">OMNI STORE</div>
        </div>
        <ul class="menu-list">
            <li onclick="goBackMain(); toggleMenu();">🏠 الرئيسية</li>
            <li onclick="openSection('تيك توك'); toggleMenu();">📱 قسم تيك توك</li>
            <li onclick="openSection('انستقرام'); toggleMenu();">📸 قسم انستا</li>
            <li onclick="openSection('الذكاء الاصطناعي'); toggleMenu();">🤖 ذكاء اصطناعي</li>
            <li onclick="openSection('ستيم أونلاين'); toggleMenu();">🎮 ستيم أونلاين</li>
            <li onclick="openSection('ستيم أوفلاين'); toggleMenu();">🕹️ ستيم أوفلاين</li>
        </ul>
    </div>

    <div id="store-content">
        
        <div id="home-view">
            <img src="صورة_الرئيسيه.png" class="main-banner">

            <div class="container">
                <div class="category-card" onclick="openSection('تيك توك')">
                    <img src="قسم تيك توك .jpeg">
                    <div class="cat-name">قسم تيك توك</div>
                </div>

                <div class="category-card" onclick="openSection('انستقرام')">
                    <img src="قسم انستا .jpeg">
                    <div class="cat-name">قسم انستقرام</div>
                </div>

                <div class="category-card" onclick="openSection('الذكاء الاصطناعي')">
                    <img src="قسم الذكاء الاصطناعي .jpeg">
                    <div class="cat-name">قسم الذكاء الاصطناعي</div>
                </div>

                <div class="category-card" onclick="openSection('ستيم أونلاين')">
                    <img src="قسم ستيم اولاين .jpeg">
                    <div class="cat-name">ألعاب ستيم أونلاين</div>
                </div>

                <div class="category-card" onclick="openSection('ستيم أوفلاين')">
                    <img src="قسم ستيم اوفلاين.jpeg">
                    <div class="cat-name">ألعاب ستيم أوفلاين</div>
                </div>
            </div>
        </div>

        <div id="section-view" style="display: none; padding: 20px; text-align: center;">
            <h2 id="current-sec-name" style="color: #d4af37; margin-bottom: 20px;"></h2>
            <div style="background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px dashed #333; color: #666;">
                قريباً.. أفضل العروض والخدمات الرقمية
            </div>
        </div>

    </div>

    <script>
        const sideMenu = document.getElementById('side-menu');
        const overlay = document.getElementById('overlay');
        const backBtn = document.getElementById('back-icon');
        const branding = document.getElementById('header-branding');

        function toggleMenu() {
            sideMenu.classList.toggle('active');
            overlay.style.display = sideMenu.classList.contains('active') ? 'block' : 'none';
        }

        function openSection(name) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('section-view').style.display = 'block';
            document.getElementById('current-sec-name').innerText = name;
            
            backBtn.style.display = 'block';
            branding.style.display = 'none';
            window.scrollTo(0,0);
        }

        function goBackMain() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('section-view').style.display = 'none';
            
            backBtn.style.display = 'none';
            branding.style.display = 'flex';
        }
    </script>
</body>
</html>
