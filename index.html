<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- الأساسيات --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        /* الشريط العلوي الفخم */
        header {
            position: fixed; top: 12px; left: 5%; width: 90%; height: 60px;
            background: rgba(15, 15, 15, 0.75); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .header-title { color: #d4af37; font-weight: 900; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .saudi-flag { width: 24px; animation: wave 2s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { transform: rotate(0); } 50% { transform: rotate(10deg) translateY(-3px); } }
        .menu-dots { font-size: 30px; color: #d4af37; cursor: pointer; }

        /* القائمة الجانبية */
        #side-menu {
            position: fixed; top: 0; right: -100%; width: 85%; height: 100vh;
            background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(15px);
            z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px; border-left: 2px solid #d4af37; overflow-y: auto;
        }
        #side-menu.active { right: 0; }
        .menu-logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #d4af37; display: block; margin: 0 auto 15px; object-fit: cover; }

        /* الأزرار والروابط */
        .menu-list { list-style: none; }
        .menu-list li { padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; color: #fff; font-size: 1rem; }
        .sub-menu { padding: 10px 20px; background: #0c0c0c; display: none; border-radius: 10px; margin: 5px 0; }
        .sub-menu a { display: block; color: #d4af37; text-decoration: none; padding: 12px 0; font-size: 0.9rem; border-bottom: 1px solid #1a1a1a; }

        /* نظام التقييم */
        .rating-box { background: #111; padding: 20px; border-radius: 15px; margin-top: 25px; border: 1px solid #222; text-align: center; }
        .stars { color: #444; font-size: 1.8rem; margin: 10px 0; cursor: pointer; }
        .stars .star.active { color: #d4af37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-family: 'Cairo'; }
        .send-btn { background: #d4af37; color: #000; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 900; cursor: pointer; }

        /* المحتوى الرئيسي */
        #main-content { padding-top: 90px; }
        
        /* الصورة الرئيسية (المشكلة كانت هنا) */
        .hero-banner {
            width: 92%; margin: 0 auto 25px; display: block;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        .container { padding: 0 15px 50px; }
        .cat-item { margin-bottom: 35px; text-align: center; }
        .cat-item img { width: 100%; border-radius: 20px; border: 1px solid #1a1a1a; object-fit: cover; aspect-ratio: 2/1; }
        .cat-label { color: #d4af37; font-weight: bold; margin-top: 12px; font-size: 1.2rem; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" class="saudi-flag">
            متجر أومني
        </div>
        <div class="menu-dots" onclick="toggleSideMenu()">&#8942;</div>
    </header>

    <div id="overlay" onclick="toggleSideMenu()"></div>

    <div id="side-menu">
        <img src="لوقو المتجر.jpeg" class="menu-logo">
        <div style="text-align: center; color: #d4af37; font-weight: 900; margin-bottom: 20px;">OMNI STORE</div>
        
        <ul class="menu-list">
            <li onclick="location.reload()">🏠 الرئيسية</li>
            <li onclick="toggleContact()">📞 تواصل مع المتجر ▼</li>
            <div id="contact-options" class="sub-menu">
                <a href="https://wa.me/9665XXXXXXXX?text=عندي مشكلة في طلبي">⚠️ مشكلة في طلبي</a>
                <a href="https://wa.me/9665XXXXXXXX?text=استفسار لطلبي رقم: ">🔍 استفسار لطلبي</a>
                <a href="https://wa.me/9665XXXXXXXX?text=عندي استفسار عام">💡 استفسار عام</a>
            </div>
            <li>📱 جميع الأقسام</li>
        </ul>

        <div class="rating-box">
            <div style="color: #d4af37; font-weight: bold; margin-bottom: 10px;">تقييم المتجر</div>
            <input type="text" id="user-name" placeholder="اسمك">
            <div class="stars" id="star-container">
                <span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span>
            </div>
            <textarea id="user-review" placeholder="اكتب رأيك هنا..." rows="2"></textarea>
            <button class="send-btn" onclick="sendReview()">إرسال التقييم</button>
        </div>
    </div>

    <div id="main-content">
        <img src="القائمه الرئيسيه .jpeg" class="hero-banner" onerror="this.src='https://via.placeholder.com/800x400/000/d4af37?text=Image+Not+Found+Check+Filename'">

        <div class="container">
            <div class="cat-item"><img src="قسم تيك توك .jpeg"><div class="cat-label">قسم تيك توك</div></div>
            <div class="cat-item"><img src="قسم انستا .jpeg"><div class="cat-label">قسم انستقرام</div></div>
            <div class="cat-item"><img src="قسم الذكاء الاصطناعي .jpeg"><div class="cat-label">الذكاء الاصطناعي</div></div>
            <div class="cat-item"><img src="قسم ستيم اولاين .jpeg"><div class="cat-label">ستيم أونلاين</div></div>
            <div class="cat-item"><img src="قسم ستيم اوفلاين.jpeg"><div class="cat-label">ستيم أوفلاين</div></div>
        </div>
    </div>

    <script>
        // فتح القائمة
        function toggleSideMenu() {
            const m = document.getElementById('side-menu');
            const o = document.getElementById('overlay');
            m.classList.toggle('active');
            o.style.display = m.classList.contains('active') ? 'block' : 'none';
        }

        // فتح خيارات التواصل
        function toggleContact() {
            const opt = document.getElementById('contact-options');
            opt.style.display = (opt.style.display === 'block') ? 'none' : 'block';
        }

        // منطق النجوم
        const stars = document.querySelectorAll('.star');
        let currentRating = 0;
        stars.forEach(s => {
            s.onclick = function() {
                currentRating = this.getAttribute('data-value');
                stars.forEach(st => st.classList.remove('active'));
                for(let i=0; i<currentRating; i++) stars[i].classList.add('active');
            }
        });

        // إرسال التقييم
        function sendReview() {
            const name = document.getElementById('user-name').value;
            if(!name || currentRating == 0) { alert('فضلاً أدخل اسمك والتقييم'); return; }
            alert('شكراً ' + name + '! تم إرسال تقييمك بنجاح.');
            toggleSideMenu();
        }
    </script>
</body>
</html>
