<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni Store - الفخامة الرقمية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #c7a13c; --bg: #000; --secondary: #8a2be2; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; overflow-x: hidden; font-family: sans-serif; }
        
        /* شاشة الدخول */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #111; padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 85%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; text-align: center; box-sizing: border-box; }

        /* زر الترس والقائمة */
        #settingsBtn { position: fixed; top: 15px; right: 15px; z-index: 5000; font-size: 28px; cursor: pointer; background: rgba(0,0,0,0.6); border-radius: 50%; padding: 8px; display: block; }
        #sideMenu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #111; z-index: 6000; transition: 0.4s; padding: 20px; box-sizing: border-box; border-left: 2px solid var(--primary); }
        #sideMenu.active { right: 0; }
        .menu-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; color: var(--primary); font-weight: bold; }

        /* الأزرار الشفافة للجوال */
        .hero-container { width: 100vw; height: 100vh; position: relative; }
        .hero-image { width: 100%; height: 100%; object-fit: cover; }
        .touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; }
        .touch-layer button { position: absolute; background: rgba(255,255,255,0); border: none; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; }

        /* الصفحات المستقلة */
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 8000; overflow-y: auto; padding-bottom: 100px; }
        .page-header { background: #111; padding: 15px; border-bottom: 2px solid var(--primary); display: flex; align-items: center; position: sticky; top: 0; z-index: 8100; }
        
        .products-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 15px; }
        .product-item { background: #161616; padding: 20px; border-radius: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        .review-input-box { padding: 20px; background: #111; border-radius: 10px; margin: 15px; border: 1px solid var(--primary); }
        
        .pc-only { display: block; } .mobile-only { display: none; }
        @media (max-width: 600px) { .pc-only { display: none; } .mobile-only { display: block; } }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="login-card">
        <h2 style="color:var(--primary)">أومني ستور</h2>
        <input type="text" id="regName" placeholder="الاسم الكريم">
        <input type="tel" id="regPhone" placeholder="رقم الجوال">
        <button onclick="saveUser()" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:8px; font-weight:bold; color:black;">دخول</button>
    </div>
</div>

<div id="settingsBtn" onclick="toggleMenu()">⚙️</div>

<div id="sideMenu">
    <h3 style="color:var(--primary)">قائمة أومني</h3>
    <div class="menu-item" onclick="toggleMenu()">🏠 العودة للرئيسية</div>
    <div class="menu-item" onclick="openPage('reviewsPage')">⭐ التقييمات</div>
    <div class="menu-item" onclick="openPage('cartPage')">🛒 السلة</div>
    <div class="menu-item" onclick="window.open('https://wa.me/966548512295')">📞 الدعم الفني</div>
</div>

<div class="hero-container">
    <div class="mobile-only" style="height: 100%;">
        <img src="صوره القائمه الرئيسيه للجوال.jpeg" class="hero-image">
        <div class="touch-layer">
            <button style="top:18%; left:5%; width:90%; height:15%;" onclick="openSection('all', 'جميع الخدمات')"></button>
            <button style="top:35%; left:5%; width:45%; height:18%;" onclick="openSection('entertainment', 'ترفيه')"></button>
            <button style="top:55%; left:5%; width:45%; height:18%;" onclick="openSection('ai', 'ذكاء اصطناعي')"></button>
        </div>
    </div>
</div>

<div class="full-page" id="productsPage">
    <div class="page-header">
        <button onclick="closeAllPages()" style="background:var(--primary); border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">🔙 عودة</button>
        <h3 id="pageTitle" style="margin-right:15px; color:var(--primary);"></h3>
    </div>
    <div class="products-grid" id="productsList"></div>
</div>

<div class="full-page" id="reviewsPage">
    <div class="page-header">
        <button onclick="closeAllPages()" style="background:var(--primary); border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">🔙 عودة</button>
        <h3 style="margin-right:15px; color:var(--primary);">تقييمات العملاء</h3>
    </div>
    <div class="review-input-box">
        <input type="text" id="revText" placeholder="اكتب تجربتك هنا..." style="width:100%; background:black; border:1px solid #444; color:white; padding:12px; margin-bottom:10px; border-radius:8px;">
        <button onclick="addReview()" style="width:100%; padding:10px; background:var(--primary); border:none; font-weight:bold; border-radius:8px;">نشر التقييم</button>
    </div>
    <div id="reviewsContainer" style="padding:15px;"></div>
</div>

<div class="full-page" id="cartPage">
    <div class="page-header">
        <button onclick="closeAllPages()" style="background:var(--primary); border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">🔙 عودة</button>
        <h3 style="margin-right:15px; color:var(--primary);">سلتك الحالية</h3>
    </div>
    <div id="cartItems" style="padding:15px;"></div>
    <button onclick="sendOrder()" style="position:fixed; bottom:20px; left:5%; width:90%; padding:15px; background:var(--primary); border:none; border-radius:10px; font-weight:bold; font-size:18px;">تأكيد الطلب واتساب 👑</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
      authDomain: "omnistore-a5251.firebaseapp.com",
      databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
      projectId: "omnistore-a5251",
      storageBucket: "omnistore-a5251.firebasestorage.app",
      appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = []; let allProducts = [];

    function saveUser() {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        if(name && phone) {
            db.ref('users/' + phone).set({name, phone});
            localStorage.setItem('omni_user', phone);
            document.getElementById('authOverlay').style.display = 'none';
        }
    }

    window.onload = () => {
        if(localStorage.getItem('omni_user')) document.getElementById('authOverlay').style.display = 'none';
        db.ref('products').on('value', s => { allProducts = Object.values(s.val() || {}); });
        loadReviews();
    };

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

    function openPage(pageId) {
        closeAllPages();
        document.getElementById(pageId).style.display = 'block';
        document.getElementById('settingsBtn').style.display = 'none';
        document.getElementById('sideMenu').classList.remove('active');
    }

    function openSection(cat, title) {
        document.getElementById('pageTitle').innerText = title;
        const list = document.getElementById('productsList');
        list.innerHTML = '';
        const filtered = (cat === 'all') ? allProducts : allProducts.filter(p => p.category === cat);
        filtered.forEach(p => {
            list.innerHTML += `
                <div class="product-item">
                    <div>
                        <h4 style="margin:0;">${p.name}</h4>
                        <span style="color:var(--primary)">${p.price} ريال</span>
                    </div>
                    <button onclick="addToCart('${p.name}', ${p.price})" style="background:var(--secondary); border:none; padding:10px 15px; color:white; border-radius:8px;">إضافة +</button>
                </div>`;
        });
        openPage('productsPage');
    }

    function closeAllPages() {
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
        document.getElementById('settingsBtn').style.display = 'block';
    }

    function addToCart(name, price) {
        const item = cart.find(i => i.name === name);
        if(item) item.qty++; else cart.push({name, price, qty:1});
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        container.innerHTML = '';
        cart.forEach((item, index) => {
            container.innerHTML += `
                <div class="product-item" style="margin-bottom:10px;">
                    <span>${item.name} (x${item.qty})</span>
                    <div>
                        <button onclick="changeQty(${index}, 1)" style="background:green; color:white; border:none; padding:5px 12px; border-radius:5px;">+</button>
                        <button onclick="changeQty(${index}, -1)" style="background:red; color:white; border:none; padding:5px 12px; border-radius:5px;">-</button>
                    </div>
                </div>`;
        });
    }

    function changeQty(index, val) {
        cart[index].qty += val;
        if(cart[index].qty <= 0) cart.splice(index, 1);
        updateCartUI();
    }

    function sendOrder() {
        let msg = "طلب جديد من متجر أومني:\n";
        cart.forEach(i => msg += `- ${i.name} (العدد: ${i.qty})\n`);
        window.open(`https://wa.me/966548512295?text=${encodeURIComponent(msg)}`);
    }

    function addReview() {
        const txt = document.getElementById('revText').value;
        if(txt) {
            db.ref('reviews').push({text: txt, date: new Date().toLocaleDateString('ar-SA')});
            document.getElementById('revText').value = '';
        }
    }

    function loadReviews() {
        db.ref('reviews').on('value', s => {
            const container = document.getElementById('reviewsContainer');
            container.innerHTML = '';
            const data = s.val();
            for(let id in data) {
                container.innerHTML += `<div style="background:#161616; padding:15px; border-radius:10px; margin-bottom:10px; border-right:4px solid var(--primary);"><p style="margin:0;">${data[id].text}</p><small style="color:#666;">${data[id].date}</small></div>`;
            }
        });
    }
</script>
</body>
</html>
