<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Store - الفخامة الرقمية</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #c7a13c; --secondary: #8a2be2; --bg: #0a0a0a; }
        
        /* أنميشن دخول المتجر القديم الجميل */
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            padding-bottom: 80px;
            animation: fadeInScale 1.2s ease-out; /* تطبيق الأنميشن */
        }

        header { text-align: center; padding: 20px; background: #000; border-bottom: 2px solid var(--primary); }
        
        /* تنسيق الصورة الكبيرة التفاعلية */
        .hero-container {
            width: 95%;
            max-width: 1000px;
            margin: 20px auto;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(199, 161, 60, 0.4);
        }

        .hero-image { width: 100%; display: block; }

        /* مناطق الضغط الشفافة فوق الصورة */
        .map-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%; /* تغطية منطقة القوائم الأربعة في أسفل الصورة */
            display: flex;
        }
        .map-area { flex: 1; cursor: pointer; transition: 0.3s; }
        .map-area:hover { background: rgba(138, 43, 226, 0.1); }

        .tabs { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: #111; border-bottom: 1px solid #222; }
        .tab-btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 18px; cursor: pointer; border-radius: 20px; white-space: nowrap; }
        .tab-btn.active { background: linear-gradient(45deg, var(--secondary), var(--primary)); border-color: var(--primary); }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .product-card { background: #161616; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #222; transition: 0.3s; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .product-card img { width: 100%; border-radius: 8px; height: 110px; object-fit: cover; }
        .price { color: var(--primary); font-weight: bold; display: block; margin: 10px 0; }
        .buy-btn { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; padding: 15px; border-top: 2px solid var(--primary); display: none; justify-content: space-between; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<header>
    <img src="jpeg لوزو متجر اومني.jpeg" alt="Logo" style="height: 60px;">
</header>

<div class="hero-container" id="mainHero">
    <img src="اومني القائمه الاوله.jpeg" class="hero-image" alt="Main Banner">
    <div class="map-overlay">
        <div class="map-area" onclick="filterItems('entertainment')" title="ترفيه بلا حدود"></div>
        <div class="map-area" onclick="filterItems('ai')" title="أدوات الذكاء الاصطناعي"></div>
        <div class="map-area" onclick="filterItems('social')" title="دعم السوشال ميديا"></div>
        <div class="map-area" onclick="filterItems('cards')" title="بطاقات وهدايا"></div>
    </div>
</div>

<div class="tabs" id="tabsBar">
    <button class="tab-btn active" onclick="filterItems('all')">الكل</button>
    <button class="tab-btn" id="btn-cards" onclick="filterItems('cards')">بطاقات وهدايا</button>
    <button class="tab-btn" id="btn-social" onclick="filterItems('social')">دعم سوشل ميديا</button>
    <button class="tab-btn" id="btn-ai" onclick="filterItems('ai')">ادوات الذكاء الاصطناعي</button>
    <button class="tab-btn" id="btn-entertainment" onclick="filterItems('entertainment')">ترفيه بلا حدود</button>
</div>

<div class="products-grid" id="productsDisplay"></div>

<div class="cart-bar" id="cartBar">
    <div id="cartCount" style="color: var(--primary); font-weight: bold;">السلة: 0</div>
    <button class="buy-btn" style="width: auto; padding: 10px 25px;" onclick="sendOrder()">إتمام الطلب الملكي 👑</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
      authDomain: "omnistore-a5251.firebaseapp.com",
      databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
      projectId: "omnistore-a5251",
      storageBucket: "omnistore-a5251.firebasestorage.app",
      appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let cart = [];
    let allProducts = [];

    db.ref('products').on('value', (snapshot) => {
        const data = snapshot.val();
        allProducts = [];
        for (let id in data) { allProducts.push(data[id]); }
        renderProducts(allProducts);
    });

    function renderProducts(products) {
        const display = document.getElementById('productsDisplay');
        display.innerHTML = '';
        products.forEach(p => {
            display.innerHTML += `
                <div class="product-card">
                    <img src="${p.image}">
                    <h3 style="font-size: 1em;">${p.name}</h3>
                    <p style="font-size: 0.
