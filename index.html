<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني - Omni Store</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #c7a13c; --black: #000; --dark-red: #8b2626; --card-bg: #1a1a1a; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* نافذة تسجيل الدخول بالمقاس المطلوب */
        #authOverlay { position: fixed; inset: 0; background: var(--black); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #121212; width: 320px; height: 350px; border-radius: 20px; border: 2px solid var(--gold); text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .login-box img { width: 65px; height: 65px; border-radius: 50%; border: 1px solid var(--gold); margin-bottom: 10px; }
        .login-box input { width: 90%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; text-align: center; outline: none; }
        .login-box button { width: 90%; padding: 12px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }

        /* الترس - القائمة الأولى فقط */
        #settingsBtn { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(0,0,0,0.7); border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 99998; cursor: pointer; font-size: 20px; }

        /* تصميم الكرت المحدث (زي ديزني بلس) */
        .card { background: var(--dark-red); border-radius: 15px; margin: 15px; overflow: hidden; display: flex; flex-direction: column; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; }
        .card-info { padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .card-title { font-weight: bold; font-size: 18px; margin: 0; }
        .card-desc { font-size: 12px; color: #ccc; margin: 0; }
        .card-price { font-size: 18px; color: #fff; font-weight: bold; margin: 10px 0; }
        .old-price { text-decoration: line-through; color: rgba(255,255,255,0.5); font-size: 14px; margin-left: 10px; }
        .add-btn { background: none; border: 2px solid rgba(255,255,255,0.3); color: white; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .add-btn:active { background: rgba(255,255,255,0.1); }

        /* القائمة الجانبية والصفحات */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 280px; height: 100%; background: #121212; z-index: 99999; transition: 0.4s; border-left: 2px solid var(--gold); padding: 20px; box-sizing: border-box; }
        #sideMenu.active { right: 0; }
        .menu-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        
        .page { display: none; position: fixed; inset: 0; background: var(--black); z-index: 80000; overflow-y: auto; }
        .header { position: sticky; top: 0; background: #121212; padding: 15px; border-bottom: 1px solid var(--gold); display: flex; align-items: center; z-index: 80001; }
        .back-btn { background: var(--gold); border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-left: 15px; }

        .hero-container { width: 100vw; height: 100vh; position: relative; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        .grid-btn { position: absolute; background: transparent; border: none; cursor: pointer; }

        #floatingCart { position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 88888; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: red; color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }

        .pc-v { display: block; } .mob-v { display: none; }
        @media (max-width: 768px) { .pc-v { display: none; } .mob-v { display: block; } }
    </style>
</head>
<body>

<div id="settingsBtn" onclick="toggleMenu()">⚙️</div>

<div id="menuOverlay" onclick="toggleMenu()" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:99997; display:none;"></div>

<div id="authOverlay">
    <div class="login-box">
        <img src="لوقو متجر اومني .jpeg">
        <h2>تسجيل دخول</h2>
        <input type="text" id="regName" placeholder="الاسم الكريم">
        <input type="tel" id="regPhone" placeholder="رقم الجوال">
        <button onclick="saveSession()">دخول المتجر</button>
    </div>
</div>

<div id="floatingCart" onclick="openPage('cartPage')">🛒<div class="cart-count" id="cartBadge">0</div></div>

<div id="sideMenu">
    <div onclick="toggleMenu()" style="text-align:left; font-size:20px; cursor:pointer;">✕</div>
    <div class="menu-item" onclick="loadProducts('all', '📦 المنتجات')">📦 جميع الخدمات</div>
    <div class="menu-item" onclick="loadProducts('entertainment', '🎬 ترفيه')">🎬 الترفيه</div>
    <div class="menu-item" onclick="loadProducts('ai', '🤖 ذكاء اصطناعي')">🤖 الذكاء الاصطناعي</div>
    <div class="menu-item" onclick="logout()" style="color:red;">🚪 خروج</div>
</div>

<div id="heroSection" class="hero-container">
    <div class="mob-v" style="height:100%;">
        <img src="صوره القائمه الرئيسيه للجوال.jpeg" class="hero-img" onclick="loadProducts('all', 'جميع الخدمات')">
        <button class="grid-btn" style="top:34%; left:5%; width:45%; height:18%;" onclick="loadProducts('entertainment', '🎬 الترفيه')"></button>
        <button class="grid-btn" style="top:53%; left:5%; width:45%; height:18%;" onclick="loadProducts('ai', '🤖 الذكاء الاصطناعي')"></button>
        <button class="grid-btn" style="top:72%; left:5%; width:44%; height:18%;" onclick="loadProducts('social', '🚀 السوشال ميديا')"></button>
        <button class="grid-btn" style="top:72%; left:51%; width:44%; height:18%;" onclick="loadProducts('cards', '💳 البطاقات')"></button>
    </div>
    <div class="pc-v" style="height:100%;">
        <img src="اومني القائمه الاوله.jpeg" class="hero-img" onclick="loadProducts('all', 'جميع الخدمات')">
        <button class="grid-btn" style="top:75%; left:5%; width:20%; height:15%;" onclick="loadProducts('entertainment', '🎬 ترفيه')"></button>
        <button class="grid-btn" style="top:75%; left:28%; width:20%; height:15%;" onclick="loadProducts('ai', '🤖 ذكاء')"></button>
    </div>
</div>

<div class="page" id="productsPage">
    <div class="header"><button class="back-btn" onclick="closeAll()">عودة</button><h3 id="pageTitle" style="margin:0; font-size:16px;"></h3></div>
    <div id="productsGrid" style="display: grid; grid-template-columns: 1fr 1fr; padding: 10px;"></div>
</div>

<div class="page" id="cartPage">
    <div class="header"><button class="back-btn" onclick="closeAll()">عودة</button><h3 style="margin:0;">السلة</h3></div>
    <div id="cartGrid"></div>
    <button onclick="sendOrder()" style="width:90%; margin:20px 5%; padding:15px; background:var(--gold); border:none; border-radius:12px; font-weight:bold;">اطلب عبر واتساب 🚀</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I", authDomain: "omnistore-a5251.firebaseapp.com", databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com", projectId: "omnistore-a5251", storageBucket: "omnistore-a5251.firebasestorage.app", appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myCart = [], allProducts = {};

    window.onload = () => {
        const user = localStorage.getItem('omni_user');
        if(user) { document.getElementById('authOverlay').style.display = 'none'; }
        db.ref('products').on('value', s => { allProducts = s.val() || {}; });
    };

    function saveSession() {
        const n = document.getElementById('regName').value, p = document.getElementById('regPhone').value;
        if(n && p) { localStorage.setItem('omni_user', n); localStorage.setItem('omni_phone', p); location.reload(); }
    }

    function toggleMenu() {
        const menu = document.getElementById('sideMenu'), overlay = document.getElementById('menuOverlay');
        menu.classList.toggle('active'); overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
    }

    function openPage(id) {
        document.getElementById('heroSection').style.display = 'none';
        document.getElementById('settingsBtn').style.display = 'none';
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(document.getElementById('sideMenu').classList.contains('active')) toggleMenu();
        document.getElementById('floatingCart').style.display = (id === 'cartPage') ? 'none' : 'flex';
    }

    function closeAll() {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('heroSection').style.display = 'block';
        document.getElementById('settingsBtn').style.display = 'flex';
        document.getElementById('floatingCart').style.display = myCart.length > 0 ? 'flex' : 'none';
    }

    function loadProducts(cat, title) {
        document.getElementById('pageTitle').innerText = title;
        const grid = document.getElementById('productsGrid'); grid.innerHTML = '';
        Object.keys(allProducts).forEach(key => {
            const p = allProducts[key];
            if(cat === 'all' || p.category === cat) {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img || 'https://via.placeholder.com/400'}" class="card-img">
                        <div class="card-info">
                            <p class="card-title">${p.name}</p>
                            <p class="card-desc">${p.description || 'التجربة الأفضل للمشاهد'}</p>
                            <p class="card-price">${p.price} ريال <span class="old-price">${parseInt(p.price)+20}</span></p>
                            <button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">🛒 Add to cart</button>
                        </div>
                    </div>`;
            }
        });
        openPage('productsPage');
    }

    function addToCart(n, p) {
        myCart.push({n, p});
        document.getElementById('cartBadge').innerText = myCart.length;
        document.getElementById('floatingCart').style.display = 'flex';
        updateCartList();
    }

    function updateCartList() {
        const grid = document.getElementById('cartGrid'); grid.innerHTML = ''; let total = 0;
        myCart.forEach((item, i) => { total += item.p; grid.innerHTML += `<div style="padding:15px; border-bottom:1px solid #222;">${item.n} - ${item.p} ريال <button onclick="removeItem(${i})" style="color:red; background:none; border:none; float:left;">حذف</button></div>`; });
    }

    function removeItem(i) { myCart.splice(i, 1); document.getElementById('cartBadge').innerText = myCart.length; updateCartList(); }

    function sendOrder() {
        const u = localStorage.getItem('omni_user'), p = localStorage.getItem('omni_phone');
        let text = `طلب جديد:\n👤 ${u}\n📱 ${p}\n\n`;
        myCart.forEach(i => text += `- ${i.n} (${i.p} ريال)\n`);
        window.open(`https://wa.me/966548512295?text=${encodeURIComponent(text)}`);
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
